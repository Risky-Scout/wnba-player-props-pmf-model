# Pre-Game Odds Refresh — publishes edges well before tip-off
#
# Sportsbooks post WNBA player props 24-48h in advance. This workflow
# leverages existing model artifacts to compute and publish edges as early
# as the evening before the game — no model retraining required.
#
# Schedule:
#   20:00 UTC (4 PM ET) day-before   — books have posted next-day lines
#   00:00 UTC (8 PM ET) day-before   — early sharp action captured
#   08:00 UTC (4 AM ET) game morning — refresh before bettors wake up
#
# Delivery URLs:
#   https://sportsodds.wizardofodds.com/tools/odds-scanner/predictions/WNBA/Pre-Game/Edge
#   https://sportsodds.wizardofodds.com/tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions

name: Pre-Game Odds Refresh

on:
  schedule:
    - cron: '0 20 * * *'   # 4 PM ET  — day-before afternoon odds capture
    - cron: '0 0 * * *'    # 8 PM ET  — evening refresh (20:00 ET prior day = 00:00 UTC)
    - cron: '0 8 * * *'    # 4 AM ET  — early morning, 15+ hours before tip-off
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  odds_refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: odds-refresh-${{ github.event.inputs.game_date || 'scheduled' }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
      pages: write
    env:
      BDL_API_KEY:  ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Resolve game date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            RESOLVED_DATE="${{ github.event.inputs.game_date }}"
            echo "Targeting manually specified date: ${RESOLVED_DATE}"
          else
            # Evening runs (20:00 UTC = 4 PM ET, 00:00 UTC = 8 PM ET prior day) are
            # intended to capture next-day market lines posted by sportsbooks 24-48h out.
            # The 4 AM ET run (08:00 UTC) targets the same calendar day as game time.
            UTC_HOUR=$(date -u +%H)
            if [ "$UTC_HOUR" -ge 8 ] && [ "$UTC_HOUR" -lt 12 ]; then
              # 4 AM ET run (08:00–11:59 UTC) — games tip tonight, target today
              RESOLVED_DATE="$(date -u +%Y-%m-%d)"
              echo "Targeting today (4 AM ET run, UTC_HOUR=${UTC_HOUR}): ${RESOLVED_DATE}"
            else
              # 4 PM ET (20:00 UTC) or 8 PM ET (00:00 UTC) runs — target tomorrow's slate
              RESOLVED_DATE="$(date -u -d 'tomorrow' +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)"
              echo "Targeting tomorrow (evening run, UTC_HOUR=${UTC_HOUR}): ${RESOLVED_DATE}"
            fi
          fi
          echo "GAME_DATE=${RESOLVED_DATE}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Download existing model + PMF artifacts so we don't need to retrain
      # ------------------------------------------------------------------
      - name: Download latest calibrators
        run: |
          mkdir -p artifacts/models/calibration
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=calibrators-latest" \
            --jq '[.artifacts[] | select(.expired==false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/calibrators.zip
            unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
            echo "Calibrators downloaded (id=$AID)"
          else
            echo "[WARN] calibrators-latest not found — will run without calibration"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download latest stage4 model
        run: |
          mkdir -p artifacts/models/stage4_baseline
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=model-stage4-latest" \
            --jq '[.artifacts[] | select(.expired==false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/model.zip
            unzip -o /tmp/model.zip -d artifacts/models/stage4_baseline
            echo "Stage4 model downloaded (id=$AID)"
          else
            echo "[WARN] model-stage4-latest not found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download latest PMFs from most recent pregame artifact
        run: |
          mkdir -p deliveries/tonight
          # Search for artifacts for GAME_DATE (correctly set to today or tomorrow above),
          # then fall back to the most recent pregame-initial artifact of any date.
          for ARTIFACT_PREFIX in \
            "pregame-final-${GAME_DATE}" \
            "pregame-initial-${GAME_DATE}" \
            "pregame-initial"; do
            AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=${ARTIFACT_PREFIX}" \
              --jq '[.artifacts[] | select(.expired==false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
            if [ -n "$AID" ] && [ "$AID" != "null" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/pregame_artifact.zip
              unzip -o /tmp/pregame_artifact.zip -d .
              echo "Downloaded ${ARTIFACT_PREFIX} (id=$AID)"
              break
            fi
          done
          ls deliveries/tonight/*.parquet 2>/dev/null || echo "[INFO] No cached PMF parquets found — will regenerate"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ------------------------------------------------------------------
      # Pull fresh odds — this is the whole point of this workflow
      # ------------------------------------------------------------------
      - name: Pull current Odds API player props
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/processed
          echo "Odds API pull complete at $(date -u)"
        continue-on-error: true

      - name: Pull opening line snapshot (for line movement tracking)
        run: |
          python scripts/pull_odds_api_closing_lines.py \
            --game-date "$GAME_DATE" \
            --out-dir data/clv_tracking
        continue-on-error: true

      # ------------------------------------------------------------------
      # If no cached PMFs exist, regenerate from existing model artifacts
      # ------------------------------------------------------------------
      - name: Regenerate PMFs if not cached
        run: |
          PMF_FILE="deliveries/tonight/full_pmfs_wide.parquet"
          PROJ_FILE="deliveries/tonight/player_projections_${GAME_DATE}.parquet"
          if [ ! -f "$PMF_FILE" ] && [ ! -f "$PROJ_FILE" ]; then
            echo "No cached PMFs — regenerating from model artifacts"
            FEATURES="data/processed/wnba_player_game_features_wide.parquet"
            if [ -f "$FEATURES" ]; then
              python scripts/predict_today.py \
                --features-wide "$FEATURES" \
                --game-date "$GAME_DATE" \
                --out-dir deliveries/tonight \
                --model-dir artifacts/models/stage4_baseline \
                --cal-dir artifacts/models/calibration
            else
              echo "[WARN] No features parquet available — skipping PMF regeneration"
            fi
          else
            echo "Cached PMFs found — skipping regeneration"
          fi
        continue-on-error: true

      # ------------------------------------------------------------------
      # Build edge report with fresh odds against existing PMFs
      # ------------------------------------------------------------------
      - name: Build edge report (fresh odds × cached PMFs)
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/tonight \
            --game-date "$GAME_DATE" \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet
          echo "Edge report built at $(date -u)"
        continue-on-error: true

      # ------------------------------------------------------------------
      # Generate and publish web pages
      # ------------------------------------------------------------------
      - name: Generate Edge Board + PMF Dashboard pages
        run: |
          PROJ_FILE="deliveries/tonight/player_projections_${GAME_DATE}.parquet"
          if [ ! -f "$PROJ_FILE" ]; then
            PROJ_FILE=$(ls deliveries/tonight/player_projections_*.parquet 2>/dev/null | head -1 || echo "")
          fi
          EDGE_FILE="deliveries/tonight/publishable_edges.parquet"
          GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")

          if [ -f "$EDGE_FILE" ]; then
            python scripts/generate_web_pages.py \
              --game-date "$GAME_DATE" \
              ${PROJ_FILE:+--projections "$PROJ_FILE"} \
              --edges "$EDGE_FILE" \
              --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game \
              --live-dir tools/odds-scanner/predictions/WNBA/Inplay/Edges \
              --skip-live-html \
              --release-id "$GITHUB_RUN_ID" \
              --git-commit "$GIT_COMMIT"
            echo "Pages generated at $(date -u)"
          else
            echo "[WARN] No edge file found — skipping page generation"
          fi
        continue-on-error: false

      - name: Generate Distributions + seed Live In-Play page
        run: |
          GIT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          python scripts/generate_distributions_page.py \
            --game-date "$GAME_DATE" \
            --base-dir tools/odds-scanner/predictions/WNBA \
            --release-id "$GITHUB_RUN_ID" \
            --git-commit "$GIT_COMMIT"
          echo "Distributions page generated for ${GAME_DATE}"

      - name: Validate pre-game page release lineage (BLOCKING — pregame_odds_refresh)
        run: |
          python - <<'EOF'
          import json, os, sys
          from pathlib import Path
          from wnba_props_model.pipeline.market_integrity import (
              validate_page_release_lineage, ArtifactLineageMismatchError,
              check_no_stale_fallback, StaleFallbackForbiddenError,
          )
          run_id    = os.environ.get("GITHUB_RUN_ID", "")
          base_dir  = Path("tools/odds-scanner/predictions/WNBA/Pre-Game")
          edge_path = base_dir / "Edge" / "latest.json"
          dist_path = base_dir / "Distributions" / "latest.json"
          try:
              check_no_stale_fallback("edge_page", edge_path)
              check_no_stale_fallback("dist_page", dist_path)
          except StaleFallbackForbiddenError as exc:
              print(f"[FATAL] Stale page: {exc}", file=sys.stderr); sys.exit(1)
          edge_json = json.loads(edge_path.read_text())
          dist_json = json.loads(dist_path.read_text())
          if run_id:
              try:
                  validate_page_release_lineage(edge_json, dist_json, expected_release_id=run_id)
                  print(f"Page release lineage: PASS (release_id={run_id!r})")
              except ArtifactLineageMismatchError as exc:
                  print(f"[FATAL] {exc}", file=sys.stderr); sys.exit(1)
          else:
              print("[WARN] GITHUB_RUN_ID not set — skipping release lineage check")
          print("Page lineage validation (odds_refresh): PASS")
          EOF
        env:
          GAME_DATE: ${{ env.GAME_DATE }}
        continue-on-error: false

      - name: Stage all outputs for single gh-pages deploy
        run: |
          # Consolidate every output directory into _site so we make exactly
          # one push to gh-pages — eliminates all push race conditions.
          DIRS=(
            "tools/odds-scanner/predictions/WNBA/Pre-Game/Edge"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions"
            "tools/odds-scanner/predictions/WNBA/In-Play/Edges"
          )
          for DIR in "${DIRS[@]}"; do
            if [ -d "$DIR" ]; then
              mkdir -p "_site/${DIR}"
              cp -r "${DIR}/." "_site/${DIR}/"
            fi
          done
          [ -d "tools/odds-scanner" ] && cp -r tools/odds-scanner/. _site/tools/odds-scanner/ || true
          echo "Staged files: $(find _site -type f | wc -l)"

      - name: Deploy all pages to gh-pages (single push — no race condition)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true

      - name: Deploy WNBA pages to sportsodds.wizardofodds.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/ftp_deploy.py
        continue-on-error: true
