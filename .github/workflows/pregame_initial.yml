# Pre-Game Initial Projections (T-1 day baseline) -- blueprint S11.1
# Runs at 10:00 UTC daily (6am ET) -- guarantees projections are available
# >=13 hours before typical WNBA tip times (23:00-01:00 UTC).
#
# Delivery URL: https://sportsodds.wizardofodds.com/WNBA/Pre-Game/Edge/
name: Pre-Game Initial Projections (T-1 day)

on:
  # Run automatically after the daily pipeline completes (ensures model + calibrators are available).
  # IMPORTANT: Do NOT add a branches filter here — schedule-triggered workflows do not populate
  # github.event.workflow_run.head_branch, so the branches filter silently prevents firing.
  workflow_run:
    workflows: ["Daily WNBA PMF Pipeline", "Weekly OOF Refresh & Calibration"]
    types: [completed]
  # Safety-net crons: run 30 min after each daily_pipeline cron (10 UTC and 14 UTC)
  # so we still publish even if the explicit workflow dispatch somehow fails.
  # 10:30 UTC = 6:30 AM ET — guarantees edges are live ≥12h before any WNBA tip-off.
  schedule:
    - cron: '30 10 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  pregame_initial:
    runs-on: ubuntu-latest
    # When triggered via workflow_run (daily pipeline or weekly calibration),
    # only proceed if the upstream workflow succeeded.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: pregame-initial-${{ github.event.inputs.game_date || 'scheduled' }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
      pages: write
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download calibrators (trigger-aware exact-run or compatible upstream run)
        # Routing policy (Gap 1 — trigger-aware):
        #   Daily trigger  ("Daily WNBA PMF Pipeline"):
        #     calibrators = most recent successful weekly_calibration run on main
        #     (the exact triggering daily run trains a model, not calibrators)
        #   Weekly trigger ("Weekly OOF Refresh & Calibration"):
        #     calibrators = exact triggering run (freshly fitted calibrators)
        #   Scheduled/manual:
        #     calibrators = most recent successful weekly_calibration run on main
        # NEVER select by latest name alone. Fail if no compatible artifact is found.
        # Gap 2: The downloaded calibration artifact is the sole authoritative source.
        #        Do NOT overwrite any downloaded calibration files with git-committed versions.
        run: |
          mkdir -p artifacts/models/calibration
          TRIGGER_WORKFLOW_NAME="${{ github.event.workflow_run.name }}"

          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "$TRIGGER_WORKFLOW_NAME" = "Weekly OOF Refresh & Calibration" ]; then
            # Weekly trigger: calibrators = exact triggering run
            TRIGGER_RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Weekly trigger: resolving calibrators from exact triggering run ${TRIGGER_RUN_ID}"
            AID=$(gh api "repos/${{ github.repository }}/actions/runs/${TRIGGER_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("calibrators")) | select(.expired == false)] | .[0].id' 2>/dev/null || echo "")
            SOURCE_RUN_ID="${TRIGGER_RUN_ID}"
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "$TRIGGER_WORKFLOW_NAME" = "Daily WNBA PMF Pipeline" ]; then
            # Daily trigger: calibrators = most recent compatible weekly_calibration run on main
            echo "Daily trigger: resolving calibrators from most recent weekly_calibration run on main"
            SOURCE_RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/weekly_calibration.yml/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
            if [ -z "$SOURCE_RUN_ID" ] || [ "$SOURCE_RUN_ID" = "null" ]; then
              echo "[FATAL] No successful weekly_calibration run found on main for Daily trigger calibrators." >&2
              exit 1
            fi
            AID=$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("calibrators")) | select(.expired == false)] | .[0].id' 2>/dev/null || echo "")
          else
            # Scheduled/manual: calibrators from most recent weekly_calibration run on main
            echo "Scheduled/manual trigger: resolving calibrators from most recent weekly_calibration run on main"
            SOURCE_RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/weekly_calibration.yml/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
            if [ -z "$SOURCE_RUN_ID" ] || [ "$SOURCE_RUN_ID" = "null" ]; then
              SOURCE_RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/refit_calibrators.yml/runs?branch=main&status=success&per_page=1" \
                --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
              if [ -z "$SOURCE_RUN_ID" ] || [ "$SOURCE_RUN_ID" = "null" ]; then
                echo "[FATAL] No successful weekly_calibration or refit_calibrators run found on main." >&2
                exit 1
              fi
            fi
            AID=$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("calibrators")) | select(.expired == false)] | .[0].id' 2>/dev/null || echo "")
          fi
          if [ -z "$AID" ] || [ "$AID" = "null" ]; then
            echo "[FATAL] No calibrators artifact found in source run ${SOURCE_RUN_ID}. Cannot proceed without a validated calibrator artifact." >&2
            exit 1
          fi
          echo "Downloading calibrators artifact id=${AID} from source run ${SOURCE_RUN_ID}"
          gh api "repos/${{ github.repository }}/actions/artifacts/${AID}/zip" > /tmp/calibrators.zip
          unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
          echo "SOURCE_CALIBRATORS_RUN_ID=${SOURCE_RUN_ID}" >> $GITHUB_ENV
          echo "Calibrators downloaded OK (artifact_id=${AID}, source_run=${SOURCE_RUN_ID})"
          # Manifest existence check only — full validation via shared validator runs in
          # "Validate artifact manifests" step (after feature build when hashes are available).
          if [ ! -f "artifacts/models/calibration/artifact_manifest_calibrator.json" ]; then
            echo "[FATAL] No artifact_manifest_calibrator.json found after download. A missing artifact manifest is FATAL." >&2
            exit 1
          fi
          echo "Calibrator manifest found — full validation deferred to post-feature-build step."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Download stage4 model (trigger-aware exact-run or compatible upstream run)
        # Routing policy (Gap 1 — trigger-aware):
        #   Daily trigger  ("Daily WNBA PMF Pipeline"):
        #     model = exact triggering run (just trained)
        #   Weekly trigger ("Weekly OOF Refresh & Calibration"):
        #     model = most recent successful daily_pipeline run on main
        #   Scheduled/manual:
        #     model = most recent successful daily_pipeline run on main
        # NEVER select by latest name alone. A missing model artifact must exit nonzero.
        run: |
          mkdir -p artifacts/models/stage4_baseline
          TRIGGER_WORKFLOW_NAME="${{ github.event.workflow_run.name }}"

          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "$TRIGGER_WORKFLOW_NAME" = "Daily WNBA PMF Pipeline" ]; then
            # Daily trigger: model = exact triggering run
            TRIGGER_RUN_ID="${{ github.event.workflow_run.id }}"
            echo "Daily trigger: resolving model from exact triggering run ${TRIGGER_RUN_ID}"
            AID=$(gh api "repos/${{ github.repository }}/actions/runs/${TRIGGER_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("model-stage4")) | select(.expired == false)] | .[0].id' 2>/dev/null || echo "")
            SOURCE_RUN_ID="${TRIGGER_RUN_ID}"
          else
            # Weekly trigger or scheduled/manual: model from most recent daily_pipeline run on main
            echo "Weekly/scheduled/manual trigger: resolving model from most recent daily_pipeline run on main"
            SOURCE_RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/daily_pipeline.yml/runs?branch=main&status=success&per_page=1" \
              --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
            if [ -z "$SOURCE_RUN_ID" ] || [ "$SOURCE_RUN_ID" = "null" ]; then
              echo "[FATAL] No successful daily_pipeline run found on main. A missing model artifact must exit nonzero. The pregame publishing workflow must never train a replacement model." >&2
              exit 1
            fi
            AID=$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("model-stage4")) | select(.expired == false)] | .[0].id' 2>/dev/null || echo "")
          fi
          if [ -z "$AID" ] || [ "$AID" = "null" ]; then
            echo "[FATAL] No model-stage4 artifact found in source run ${SOURCE_RUN_ID}. A missing model artifact must exit nonzero. The pregame publishing workflow must never train a replacement model." >&2
            exit 1
          fi
          echo "Downloading model-stage4 artifact id=${AID} from source run ${SOURCE_RUN_ID}"
          gh api "repos/${{ github.repository }}/actions/artifacts/${AID}/zip" > /tmp/model_stage4.zip
          unzip -o /tmp/model_stage4.zip -d artifacts/models/stage4_baseline
          echo "SOURCE_MODEL_RUN_ID=${SOURCE_RUN_ID}" >> $GITHUB_ENV
          echo "Stage4 model downloaded OK (artifact_id=${AID}, source_run=${SOURCE_RUN_ID})"
          # Manifest existence check only — full validation via shared validator runs in
          # "Validate artifact manifests" step (after feature build when hashes are available).
          if [ ! -f "artifacts/models/stage4_baseline/artifact_manifest_model.json" ]; then
            echo "[FATAL] No artifact_manifest_model.json found after download. A missing artifact manifest is FATAL." >&2
            exit 1
          fi
          echo "Model manifest found — full validation deferred to post-feature-build step."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

      - name: Resolve game date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            RESOLVED_DATE="${{ github.event.inputs.game_date }}"
            echo "Explicit game_date input: ${RESOLVED_DATE}"
            RESOLUTION_METHOD="manual_input"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # workflow_run trigger: derive game_date from the exact triggering artifact/manifest.
            # If the artifact or date is unavailable, exit nonzero. Do NOT fall back to today.
            TRIGGER_RUN_ID="${{ github.event.workflow_run.id }}"
            DELIVERY_NAME=$(gh api "repos/${{ github.repository }}/actions/runs/${TRIGGER_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("daily-delivery-"))] | .[0].name' \
              2>/dev/null || echo "")
            if [ -z "$DELIVERY_NAME" ] || [ "$DELIVERY_NAME" = "null" ]; then
              echo "[FATAL] No daily-delivery artifact found in triggering run ${TRIGGER_RUN_ID}." >&2
              echo "[FATAL] game_date cannot be derived from workflow_run trigger without the triggering artifact." >&2
              echo "[FATAL] Do NOT fall back to today for workflow_run triggers." >&2
              exit 1
            fi
            INFERRED_DATE=$(echo "$DELIVERY_NAME" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
            if [ -z "$INFERRED_DATE" ]; then
              echo "[FATAL] Could not extract date from artifact name '${DELIVERY_NAME}' in triggering run ${TRIGGER_RUN_ID}." >&2
              echo "[FATAL] game_date must be derived from the exact triggering artifact, not today." >&2
              exit 1
            fi
            RESOLVED_DATE="$INFERRED_DATE"
            RESOLUTION_METHOD="workflow_run_artifact"
            echo "Derived game_date from triggering artifact '${DELIVERY_NAME}': ${RESOLVED_DATE}"
          else
            # cron/schedule or workflow_dispatch without explicit date — resolve today and record method
            RESOLVED_DATE="$(date -u +%Y-%m-%d)"
            RESOLUTION_METHOD="scheduled_today"
            echo "Cron/schedule trigger — using today: ${RESOLVED_DATE}"
          fi
          echo "GAME_DATE=${RESOLVED_DATE}" >> $GITHUB_ENV
          echo "GAME_DATE_RESOLUTION_METHOD=${RESOLUTION_METHOD}" >> $GITHUB_ENV
          echo "Game date resolved to: ${RESOLVED_DATE} (method=${RESOLUTION_METHOD})"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull BDL current-season data
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl
        continue-on-error: false

      - name: Build canonical tables
        run: |
          python scripts/build_canonical_tables.py \
            --raw-dir data/raw/bdl \
            --out-dir data/processed
        continue-on-error: false

      - name: Build feature matrix from canonical tables
        run: |
          python scripts/build_features.py \
            --data-dir data/processed
        continue-on-error: false

      - name: Validate artifact manifests — model and calibrator (Fix 1 — BLOCKING)
        # Call shared validate_artifact_manifest() for both artifacts.
        # A missing manifest, wrong source_run_id/commit, missing cutoff, or blank hash = FATAL.
        # Run AFTER feature build so feature_schema_manifest.json exists for hash validation.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch source_commit for calibrator run from GitHub API
          CAL_HEAD_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_CALIBRATORS_RUN_ID}" \
            --jq '.head_sha' 2>/dev/null || echo "")
          if [ -z "$CAL_HEAD_SHA" ] || [ "$CAL_HEAD_SHA" = "null" ]; then
            echo "[FATAL] Cannot fetch head_sha for calibrator source run ${SOURCE_CALIBRATORS_RUN_ID}." >&2
            exit 1
          fi
          # Fetch source_commit for model run from GitHub API
          MODEL_HEAD_SHA=$(gh api "repos/${{ github.repository }}/actions/runs/${SOURCE_MODEL_RUN_ID}" \
            --jq '.head_sha' 2>/dev/null || echo "")
          if [ -z "$MODEL_HEAD_SHA" ] || [ "$MODEL_HEAD_SHA" = "null" ]; then
            echo "[FATAL] Cannot fetch head_sha for model source run ${SOURCE_MODEL_RUN_ID}." >&2
            exit 1
          fi
          export EXPECTED_CAL_SOURCE_RUN_ID="${SOURCE_CALIBRATORS_RUN_ID}"
          export EXPECTED_CAL_SOURCE_COMMIT="${CAL_HEAD_SHA}"
          export EXPECTED_MODEL_SOURCE_RUN_ID="${SOURCE_MODEL_RUN_ID}"
          export EXPECTED_MODEL_SOURCE_COMMIT="${MODEL_HEAD_SHA}"
          python3 - <<'PYEOF'
          import hashlib, json, os, sys
          from pathlib import Path
          from datetime import datetime, timezone
          from wnba_props_model.pipeline.market_integrity import validate_artifact_manifest, ArtifactManifestError

          prediction_ts = datetime.now(timezone.utc).isoformat()

          feat_manifest_path = Path("data/processed/feature_schema_manifest.json")
          if not feat_manifest_path.exists():
              print(f"[FATAL] feature_schema_manifest.json not found at {feat_manifest_path}. "
                    "Cannot validate artifact manifests without it.", file=sys.stderr)
              sys.exit(1)
          feature_manifest_hash = hashlib.sha256(feat_manifest_path.read_bytes()).hexdigest()[:16]

          # ── Validate calibrator manifest ─────────────────────────────────────────────
          cal_manifest_path = Path("artifacts/models/calibration/artifact_manifest_calibrator.json")
          if not cal_manifest_path.exists():
              print(f"[FATAL] No artifact_manifest_calibrator.json — missing manifest is FATAL.", file=sys.stderr)
              sys.exit(1)
          cal_manifest = json.loads(cal_manifest_path.read_text())

          cal_config_path = Path("config/model/stage6_calibration.yaml")
          if not cal_config_path.exists():
              cal_config_path = Path("config/model/stage5_oof.yaml")
          cal_config_hash = (hashlib.sha256(cal_config_path.read_bytes()).hexdigest()[:16]
                             if cal_config_path.exists() else None)

          try:
              validate_artifact_manifest(
                  cal_manifest,
                  expected_artifact_type="calibrator",
                  prediction_timestamp_utc=prediction_ts,
                  source_run_id=os.environ.get("EXPECTED_CAL_SOURCE_RUN_ID"),
                  source_commit=os.environ.get("EXPECTED_CAL_SOURCE_COMMIT"),
                  feature_manifest_hash=feature_manifest_hash,
                  config_hash=cal_config_hash,
              )
              print(f"Calibrator manifest validated OK: "
                    f"source_run={cal_manifest.get('source_run_id')}, "
                    f"commit={cal_manifest.get('source_commit','')[:8]}, "
                    f"gate={cal_manifest.get('gate_status')}")
          except ArtifactManifestError as exc:
              print(f"[FATAL] Calibrator artifact manifest validation failed: {exc}", file=sys.stderr)
              sys.exit(1)

          # ── Validate model manifest ───────────────────────────────────────────────────
          model_manifest_path = Path("artifacts/models/stage4_baseline/artifact_manifest_model.json")
          if not model_manifest_path.exists():
              print(f"[FATAL] No artifact_manifest_model.json — missing manifest is FATAL.", file=sys.stderr)
              sys.exit(1)
          model_manifest = json.loads(model_manifest_path.read_text())

          model_config_path = Path("config/model/stage4_baseline.yaml")
          model_config_hash = (hashlib.sha256(model_config_path.read_bytes()).hexdigest()[:16]
                               if model_config_path.exists() else None)

          try:
              validate_artifact_manifest(
                  model_manifest,
                  expected_artifact_type="model",
                  prediction_timestamp_utc=prediction_ts,
                  source_run_id=os.environ.get("EXPECTED_MODEL_SOURCE_RUN_ID"),
                  source_commit=os.environ.get("EXPECTED_MODEL_SOURCE_COMMIT"),
                  feature_manifest_hash=feature_manifest_hash,
                  config_hash=model_config_hash,
              )
              print(f"Model manifest validated OK: "
                    f"source_run={model_manifest.get('source_run_id')}, "
                    f"commit={model_manifest.get('source_commit','')[:8]}, "
                    f"cutoff={model_manifest.get('model_training_cutoff')}")
          except ArtifactManifestError as exc:
              print(f"[FATAL] Model artifact manifest validation failed: {exc}", file=sys.stderr)
              sys.exit(1)
          PYEOF
        continue-on-error: false

      - name: Build next-game slate (BDL games + roster)
        run: |
          mkdir -p data/schedule data/processed deliveries/tonight
          python scripts/build_next_game_slate.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight
        continue-on-error: false

      - name: Fetch and cache injury report (blueprint §5.1)
        run: |
          mkdir -p data/injuries
          python - <<'PYEOF'
          import json, os, sys, requests
          from pathlib import Path

          api_key = os.environ.get("BDL_API_KEY", "")
          game_date = os.environ.get("GAME_DATE", "")
          out_path = Path(f"data/injuries/{game_date}.json")

          if out_path.exists():
              print(f"Injury file already exists: {out_path}")
              sys.exit(0)

          if not api_key:
              print("[FATAL] BDL_API_KEY not set — cannot fetch injury report. Run must fail.", file=sys.stderr)
              sys.exit(1)

          params = {"per_page": 100}
          headers = {"Authorization": api_key}
          try:
              resp = requests.get(
                  "https://api.balldontlie.io/wnba/v1/player_injuries",
                  params=params, headers=headers, timeout=20,
              )
              resp.raise_for_status()
              data = resp.json()
              injuries = data.get("data", data) if isinstance(data, dict) else data
              normalized = []
              for r in injuries:
                  player = r.get("player") or {}
                  pid = r.get("player_id") or player.get("id") or 0
                  name = r.get("player_name") or f"{player.get('first_name','')} {player.get('last_name','')}".strip()
                  normalized.append({
                      "player_id": int(pid),
                      "player_name": name,
                      "status": str(r.get("status") or "available").lower(),
                      "return_date": r.get("return_date"),
                      "comment": r.get("comment"),
                  })
              out_path.write_text(json.dumps(normalized, indent=2))
              print(f"Saved {len(normalized)} injury records → {out_path}")
          except Exception as exc:
              print(f"[FATAL] BDL injury fetch failed: {exc} — run must fail to prevent stale injury data.", file=sys.stderr)
              sys.exit(1)
          PYEOF
        continue-on-error: false

      - name: Data schema & freshness tripwire
        id: schema-tripwire
        run: |
          python - <<'PYEOF'
          import sys, os, json
          import pathlib
          from datetime import datetime, timezone

          CRITICAL_FEATURES = [
              "player_pts_mean_l5",
              "player_minutes_mean_l5",
              "player_reb_mean_l5",
              "player_ast_mean_l5",
              "player_fg3m_mean_l5",
              "player_pts_mean_season",
              "player_minutes_mean_season",
              "opp_pts_allowed_per_100_poss_l5",
          ]

          try:
              import pandas as pd
          except ImportError:
              print("[TRIPWIRE SKIP] pandas not available — skipping schema tripwire")
              sys.exit(0)

          game_date = os.environ.get("GAME_DATE", "")
          slate_path = pathlib.Path(f"deliveries/tonight/slate_{game_date}.parquet")
          feature_path = pathlib.Path("data/processed/wnba_player_game_features_wide.parquet")
          props_path = pathlib.Path("data/processed/wnba_player_props_oddsapi_latest.parquet")
          github_env = os.environ.get("GITHUB_ENV", "")

          def set_no_deploy():
              if github_env:
                  with open(github_env, "a") as fh:
                      fh.write("NO_DEPLOY=true\n")
              print("[TRIPWIRE] NO_DEPLOY=true written to GITHUB_ENV")

          # ------------------------------------------------------------------
          # Check 1: Player count on slate
          # ------------------------------------------------------------------
          if slate_path.exists():
              slate = pd.read_parquet(slate_path)
              n_players = len(slate)
              print(f"[TRIPWIRE] Check 1 — Slate players found: {n_players} ({slate_path})")
              if n_players == 0:
                  print("ERROR: Slate has 0 players. No games scheduled or BDL slate build failed.")
                  print("       Aborting deployment (NO_DEPLOY=true).")
                  set_no_deploy()
                  sys.exit(1)
              print(f"[TRIPWIRE] Check 1 PASS: {n_players} players on slate")
          else:
              print(f"[TRIPWIRE] Check 1 SKIP: Slate not found at {slate_path} — no games today or slate build failed.")

          # ------------------------------------------------------------------
          # Check 2: Odds props market lines
          # ------------------------------------------------------------------
          if props_path.exists():
              props = pd.read_parquet(props_path)
              n_props = len(props)
              print(f"[TRIPWIRE] Check 2 — Odds props rows: {n_props}")
              if n_props == 0:
                  print("[WARN] Odds API returned 0 props with market lines. "
                        "Books may not have posted lines yet. Continuing without halt.")
              else:
                  print(f"[TRIPWIRE] Check 2 PASS: {n_props} props with market lines")
          else:
              print(f"[WARN] Check 2 SKIP: Odds props parquet not found at {props_path}. "
                    "Books may not have posted lines yet. Continuing.")

          # ------------------------------------------------------------------
          # Check 3: Critical feature columns (always validate against feature matrix,
          # not the slate — the slate is only a roster/game schedule file)
          # ------------------------------------------------------------------
          if feature_path.exists():
              feat_df = pd.read_parquet(feature_path)
              missing = [c for c in CRITICAL_FEATURES if c not in feat_df.columns]
              if missing:
                  print(f"ERROR: Missing {len(missing)} critical feature column(s): {missing}")
                  print("       This likely indicates a schema regression in build_features.py.")
                  print("       Aborting deployment (NO_DEPLOY=true).")
                  set_no_deploy()
                  sys.exit(1)
              print(f"[TRIPWIRE] Check 3 PASS: All {len(CRITICAL_FEATURES)} critical features present")
          else:
              print(f"[WARN] Check 3 SKIP: Feature matrix not found at {feature_path} — "
                    "cannot validate feature columns")

          # ------------------------------------------------------------------
          # Check 4: Data freshness (training data age)
          # ------------------------------------------------------------------
          if feature_path.exists():
              feat = pd.read_parquet(feature_path)
              date_col = next((c for c in ["game_date", "date", "game_dt"] if c in feat.columns), None)
              if date_col:
                  latest_ts = pd.to_datetime(feat[date_col]).max()
                  age_days = (datetime.now(timezone.utc) - latest_ts.replace(tzinfo=timezone.utc)).days
                  print(f"[TRIPWIRE] Check 4 — Most recent game in training data: "
                        f"{latest_ts.date()} ({age_days} day(s) old)")
                  if age_days > 14:
                      print(f"[WARN] Training data is {age_days} days old (>14 days threshold). "
                            f"Last game: {latest_ts.date()}. Check BDL history pull step.")
                  else:
                      print(f"[TRIPWIRE] Check 4 PASS: Training data is {age_days} day(s) old (<=14)")
              else:
