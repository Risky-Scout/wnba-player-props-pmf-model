# Pre-Game Initial Projections (T-1 day baseline) -- blueprint S11.1
# Runs at 10:00 UTC daily (6am ET) -- guarantees projections are available
# >=13 hours before typical WNBA tip times (23:00-01:00 UTC).
#
# Delivery URL: https://sportsodds.wizardofodds.com/tools/odds-scanner/
#               predictions/WNBA/Pre-Game-Edge/initial/
name: Pre-Game Initial Projections (T-1 day)

on:
  # Run automatically after the daily pipeline completes (ensures model + calibrators are available).
  # IMPORTANT: Do NOT add a branches filter here — schedule-triggered workflows do not populate
  # github.event.workflow_run.head_branch, so the branches filter silently prevents firing.
  workflow_run:
    workflows: ["Daily WNBA PMF Pipeline"]
    types: [completed]
  # Safety-net crons: run 30 min after each daily_pipeline cron (10 UTC and 14 UTC)
  # so we still publish even if the explicit workflow dispatch somehow fails.
  # 10:30 UTC = 6:30 AM ET — guarantees edges are live ≥12h before any WNBA tip-off.
  schedule:
    - cron: '30 10 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  pregame_initial:
    runs-on: ubuntu-latest
    concurrency:
      group: pregame-initial-${{ github.event.inputs.game_date || 'scheduled' }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
      pages: write
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download calibrators (cross-run via GitHub CLI)
        # actions/download-artifact@v4 only searches the current run.
        # Use the GitHub API to find the latest calibrators-latest artifact
        # across ALL runs in this repository.
        run: |
          mkdir -p artifacts/models/calibration
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=calibrators-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            echo "Downloading calibrators-latest artifact id=$AID"
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/calibrators.zip
            unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
            echo "Calibrators downloaded OK"
          else
            echo "[WARN] calibrators-latest artifact not found — will use self-contained training"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Restore git bias_corrections (guard against stale artifact overwrite)
        # The artifact download can overwrite our git-committed bias_corrections.json
        # with stale values from a previous weekly_calibration run. Always prefer the
        # git-committed version, which is the OOF-fitted result from weekly_calibration.
        # NOTE: OOF-derived corrections for pts/reb/ast are typically in the 0.65-0.75
        # range (not 0.90) because the raw model overshoots by ~45-60% before calibration.
        # Do NOT revert these to 0.90 — the 0.741/0.678 values are empirically correct.
        # Hard floor is 0.50 (see sanity gate below); values between 0.50-0.90 are valid.
        run: |
          git checkout HEAD -- artifacts/models/calibration/bias_corrections.json 2>/dev/null || true
          git checkout HEAD -- artifacts/models/calibration/bias_corrections_by_role.json 2>/dev/null || true
          git checkout HEAD -- artifacts/models/calibration/player_form_corrections_2026.json 2>/dev/null || true
          python3 - <<'EOF'
          import json, pathlib
          bc_path = pathlib.Path("artifacts/models/calibration/bias_corrections.json")
          if bc_path.exists():
              bc = json.loads(bc_path.read_text())
              print(f"bias_corrections (git version): {bc}")
              low = {s: v for s, v in bc.items() if v < 0.50}
              if low:
                  print(f"WARNING: bias_corrections below hard floor 0.50 — check OOF run: {low}")
              else:
                  print(f"OK: all bias_corrections >= 0.50 (min={min(bc.values()):.3f})")
          else:
              print("bias_corrections.json not found — skipping guard")
          br_path = pathlib.Path("artifacts/models/calibration/bias_corrections_by_role.json")
          if br_path.exists():
              br = json.loads(br_path.read_text())
              starters = {k: v for k, v in br.get("corrections", {}).items() if k.startswith("starter|")}
              print(f"bias_corrections_by_role starter corrections (git version): {starters}")
          EOF

      - name: Download stage4 model (cross-run via GitHub CLI)
        run: |
          mkdir -p artifacts/models/stage4_baseline
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=model-stage4-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            echo "Downloading model-stage4-latest artifact id=$AID"
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/model_stage4.zip
            unzip -o /tmp/model_stage4.zip -d artifacts/models/stage4_baseline
            echo "Stage4 model downloaded OK"
          else
            echo "[WARN] model-stage4-latest artifact not found — will use self-contained training"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Self-contained model train (if no model available from daily pipeline)
        # Runs if neither the cache nor the artifact provided model files.
        # Makes pregame_initial fully self-contained — no dependency on daily_pipeline.
        run: |
          if [ ! -f "artifacts/models/stage4_baseline/manifest.json" ] && \
             [ ! -f "artifacts/models/stage4_baseline/model_manifest.json" ]; then
            echo "[FALLBACK] No stage4 model found — training self-contained baseline"
            python scripts/pull_bdl_history.py \
              --start-season $(date -u +%Y) --end-season $(date -u +%Y) \
              --out-dir data/raw/bdl
            python scripts/build_canonical_tables.py --raw-dir data/raw/bdl --out-dir data/processed
            python scripts/build_features.py --data-dir data/processed
            python scripts/train_baseline_pmfs.py --time-decay-xi 0.003
            echo "[FALLBACK] Self-contained training complete"
          else
            echo "[OK] Stage4 model found — skipping self-contained training"
          fi
        continue-on-error: true

      - name: Resolve game date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            RESOLVED_DATE="${{ github.event.inputs.game_date }}"
            echo "Explicit game_date input: ${RESOLVED_DATE}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Triggered by daily_pipeline: infer the target date from the
            # daily-delivery-YYYY-MM-DD-RUNID artifact produced by that run.
            TRIGGER_RUN_ID="${{ github.event.workflow_run.id }}"
            DELIVERY_NAME=$(gh api "repos/${{ github.repository }}/actions/runs/${TRIGGER_RUN_ID}/artifacts" \
              --jq '[.artifacts[] | select(.name | startswith("daily-delivery-"))] | sort_by(.created_at) | reverse | .[0].name' \
              2>/dev/null || echo "")
            if [ -n "$DELIVERY_NAME" ] && [ "$DELIVERY_NAME" != "null" ]; then
              INFERRED_DATE=$(echo "$DELIVERY_NAME" | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
              if [ -n "$INFERRED_DATE" ]; then
                RESOLVED_DATE="$INFERRED_DATE"
                echo "Inferred target date from daily-delivery artifact '${DELIVERY_NAME}': ${RESOLVED_DATE}"
              else
                RESOLVED_DATE="$(date -u +%Y-%m-%d)"
                echo "Could not extract date from artifact '${DELIVERY_NAME}' — falling back to today: ${RESOLVED_DATE}"
              fi
            else
              RESOLVED_DATE="$(date -u +%Y-%m-%d)"
              echo "No daily-delivery artifact found in triggering run ${TRIGGER_RUN_ID} — falling back to today: ${RESOLVED_DATE}"
            fi
          else
            # cron safety-net — default to today
            RESOLVED_DATE="$(date -u +%Y-%m-%d)"
            echo "Cron/schedule trigger — using today: ${RESOLVED_DATE}"
          fi
          echo "GAME_DATE=${RESOLVED_DATE}" >> $GITHUB_ENV
          echo "Game date resolved to: ${RESOLVED_DATE}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull BDL current-season data
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl
        continue-on-error: true

      - name: Build canonical tables
        run: |
          python scripts/build_canonical_tables.py \
            --raw-dir data/raw/bdl \
            --out-dir data/processed
        continue-on-error: true

      - name: Build feature matrix from canonical tables
        run: |
          python scripts/build_features.py \
            --data-dir data/processed
        continue-on-error: true

      - name: Build next-game slate (BDL games + roster)
        run: |
          mkdir -p data/schedule data/processed deliveries/tonight
          python scripts/build_next_game_slate.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight
        continue-on-error: true

      - name: Fetch and cache injury report (blueprint §5.1)
        run: |
          mkdir -p data/injuries
          python - <<'PYEOF'
          import json, os, sys, requests
          from pathlib import Path

          api_key = os.environ.get("BDL_API_KEY", "")
          game_date = os.environ.get("GAME_DATE", "")
          out_path = Path(f"data/injuries/{game_date}.json")

          if out_path.exists():
              print(f"Injury file already exists: {out_path}")
              sys.exit(0)

          if not api_key:
              print("[WARN] BDL_API_KEY not set — writing empty injury file")
              out_path.write_text("[]")
              sys.exit(0)

          params = {"per_page": 100}
          headers = {"Authorization": api_key}
          try:
              resp = requests.get(
                  "https://api.balldontlie.io/wnba/v1/player_injuries",
                  params=params, headers=headers, timeout=20,
              )
              resp.raise_for_status()
              data = resp.json()
              injuries = data.get("data", data) if isinstance(data, dict) else data
              normalized = []
              for r in injuries:
                  player = r.get("player") or {}
                  pid = r.get("player_id") or player.get("id") or 0
                  name = r.get("player_name") or f"{player.get('first_name','')} {player.get('last_name','')}".strip()
                  normalized.append({
                      "player_id": int(pid),
                      "player_name": name,
                      "status": str(r.get("status") or "available").lower(),
                      "return_date": r.get("return_date"),
                      "comment": r.get("comment"),
                  })
              out_path.write_text(json.dumps(normalized, indent=2))
              print(f"Saved {len(normalized)} injury records → {out_path}")
          except Exception as exc:
              print(f"[WARN] BDL injury fetch failed: {exc} — writing empty file")
              out_path.write_text("[]")
          PYEOF
        continue-on-error: true

      - name: Generate pre-game PMF projections
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WNBA_USE_QUANTILE_MODEL: "1"
        run: |
          SLATE="deliveries/tonight/slate_${GAME_DATE}.parquet"
          if [ -f "$SLATE" ]; then
            FEATURES_SRC="$SLATE"
            echo "Using slate: $FEATURES_SRC"
          else
            FEATURES_SRC="data/processed/wnba_player_game_features_wide.parquet"
            echo "Slate not found, falling back to historical features: $FEATURES_SRC"
          fi
          python scripts/predict_today.py \
            --features-wide "$FEATURES_SRC" \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --model-dir artifacts/models/stage4_baseline \
            --cal-dir artifacts/models/calibration \
            --overrides config/player_overrides.json

      - name: Pull Odds API player props + deep links
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/processed
        continue-on-error: true

      - name: Apply injury updates (UTM redistribution)
        run: |
          python scripts/apply_injury_updates.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --injuries-json "data/injuries/${GAME_DATE}.json"
        continue-on-error: true

      - name: Compute SHAP explainability
        run: |
          python scripts/compute_shap_explainability.py \
            --game-date "$GAME_DATE" \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --model-dir artifacts/models/stage4_baseline \
            --out-dir artifacts/explainability
        continue-on-error: true

      - name: Commit SHAP top-5 to repo (permanent visibility)
        run: |
          TOP5="artifacts/explainability/shap_${GAME_DATE}_top5.json"
          LATEST="artifacts/explainability/shap_latest_top5.json"
          if [ -f "$TOP5" ]; then
            mkdir -p artifacts/explainability
            cp "$TOP5" "$LATEST"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git stash --include-untracked
            git pull --rebase origin main
            git stash pop || true
            git add -f "$LATEST"
            if ! git diff --cached --quiet; then
              git commit -m "chore: update shap_latest_top5.json for ${GAME_DATE} [skip ci]"
              git push
              echo "SHAP top-5 committed to repo."
            else
              echo "No SHAP changes to commit."
            fi
          else
            echo "[WARN] SHAP top-5 not found at $TOP5 — skipping commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Build edge report
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/tonight \
            --game-date "$GAME_DATE" \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --edge-threshold 0.0
        continue-on-error: true

      - name: Format pre-game JSON output (blueprint S3)
        run: |
          python scripts/format_pregame_output.py \
            --game-date "$GAME_DATE" \
            --pipeline-run pregame_initial \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game-Edge \
            --market-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --injuries data/injuries/${GAME_DATE}.json \
            --games data/processed/wnba_games.parquet

      - name: Copy to initial/ subdirectory
        run: |
          mkdir -p tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/initial
          SRC="tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/${GAME_DATE}_initial.json"
          if [ -f "$SRC" ]; then
            cp "$SRC" tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/initial/latest.json
            cp "$SRC" tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/initial/${GAME_DATE}.json
            echo "Copied predictions for ${GAME_DATE}"
          else
            echo "[WARN] No predictions file for ${GAME_DATE} (no games scheduled) — skipping copy"
          fi
        continue-on-error: true

      - name: Generate Edge Board + PMF Dashboard web pages (initial pass)
        run: |
          PROJ_FILE="deliveries/tonight/player_projections_${GAME_DATE}.parquet"
          if [ ! -f "$PROJ_FILE" ]; then
            PROJ_FILE=$(ls deliveries/tonight/player_projections_*.parquet 2>/dev/null | head -1 || echo "")
          fi
          EDGE_FILE="deliveries/tonight/publishable_edges.parquet"

          python scripts/generate_web_pages.py \
            --game-date "$GAME_DATE" \
            ${PROJ_FILE:+--projections "$PROJ_FILE"} \
            ${EDGE_FILE:+--edges "$EDGE_FILE"} \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game \
            --live-dir tools/odds-scanner/predictions/WNBA/In-Play/Edges \
            --skip-live-html
          echo "Initial web pages generated for ${GAME_DATE} at $(date -u)"
        continue-on-error: true

      - name: Generate Distributions page (combined Edges + PMF)
        run: |
          python scripts/generate_distributions_page.py \
            --game-date "$GAME_DATE" \
            --base-dir tools/odds-scanner/predictions/WNBA
          echo "Distributions page generated for ${GAME_DATE}"
        continue-on-error: true

      - name: Stage all outputs for single gh-pages deploy
        run: |
          # Consolidate every output directory into _site so we make exactly
          # one push to gh-pages — eliminates all push race conditions.
          mkdir -p _site/tools/odds-scanner/predictions/WNBA/Pre-Game-Edge
          mkdir -p _site/tools/odds-scanner/predictions/WNBA/Pre-Game/Edge
          mkdir -p _site/tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions
          mkdir -p _site/tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions

          [ -d "tools/odds-scanner/predictions/WNBA/Pre-Game-Edge" ] && \
            cp -r tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/. \
                  _site/tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/
          [ -d "tools/odds-scanner/predictions/WNBA/Pre-Game/Edge" ] && \
            cp -r tools/odds-scanner/predictions/WNBA/Pre-Game/Edge/. \
                  _site/tools/odds-scanner/predictions/WNBA/Pre-Game/Edge/
          [ -d "tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions" ] && \
            cp -r tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions/. \
                  _site/tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions/
          [ -d "tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions" ] && \
            cp -r tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions/. \
                  _site/tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions/
          [ -d "tools/odds-scanner" ] && \
            cp -r tools/odds-scanner/. _site/tools/odds-scanner/ || true
          echo "Staged files: $(find _site -type f | wc -l)"

      - name: Deploy all pages to gh-pages (single push — no race condition)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true

      - name: Sanity gate — block deployment if calibration is catastrophically wrong
        run: |
          python - <<'EOF'
          import json, sys, pathlib
          import pandas as pd

          # Gate 1: bias_corrections floor check
          bias_path = pathlib.Path("artifacts/models/calibration/bias_corrections.json")
          if bias_path.exists():
              bias = json.loads(bias_path.read_text())
              for stat, val in bias.items():
                  if val < 0.50:
                      print(f"GATE FAIL: bias_corrections[{stat}]={val:.3f} below 0.50 floor")
                      sys.exit(1)
              print(f"Gate 1 PASS: bias_corrections min={min(bias.values()):.3f}")
          else:
              print("Gate 1 SKIP: bias_corrections.json not found")

          # Gate 2: mean edge sanity check
          edges_path = pathlib.Path("artifacts/edge_report/publishable_edges.parquet")
          if not edges_path.exists():
              edges_path = pathlib.Path("deliveries/tonight/publishable_edges.parquet")
          if edges_path.exists():
              df = pd.read_parquet(edges_path)
              if "edge_pp" in df.columns and len(df) > 0:
                  mean_edge = df["edge_pp"].mean()
                  print(f"Gate 2: mean_edge_pp={mean_edge:.2f} across {len(df)} rows")
                  if mean_edge < -20.0:
                      print(f"DEPLOY BLOCKED: mean_edge={mean_edge:.1f}pp — calibration mismatch. Run weekly_calibration before deploying.")
                      sys.exit(1)
                  print(f"Gate 2 PASS: mean edge {mean_edge:.1f}pp is above -20pp threshold")
              else:
                  print("Gate 2 SKIP: no edge_pp column or empty parquet")
          else:
              print("Gate 2 SKIP: publishable_edges.parquet not found")

          print("All sanity gates passed — deployment approved")
          EOF

      - name: Deploy WNBA pages to sportsodds.wizardofodds.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/ftp_deploy.py
        continue-on-error: true

      - name: Upload deliveries artifact
        uses: actions/upload-artifact@v4
        with:
          name: pregame-initial-${{ env.GAME_DATE }}
          path: |
            deliveries/tonight/
            tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/
            tools/odds-scanner/predictions/WNBA/Pre-Game/Edge/
            tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions/
            tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions/
          retention-days: 14
