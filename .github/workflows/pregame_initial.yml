      - name: Prediction drift monitor
        id: drift-monitor
        run: |
          python - <<'PYEOF'
          import sys, os, json
          import pathlib
          from datetime import datetime, timezone

          try:
              import pandas as pd
          except ImportError:
              print("[DRIFT SKIP] pandas not available — skipping drift monitor")
              sys.exit(0)

          game_date = os.environ.get("GAME_DATE", "")
          edges_path = pathlib.Path("deliveries/tonight/publishable_edges.parquet")
          audit_dir = pathlib.Path("artifacts/audits")
          github_env = os.environ.get("GITHUB_ENV", "")

          STAT_COLS = ["pts", "reb", "ast", "fg3m"]
          OVERALL_LOW  = 0.15
          OVERALL_HIGH = 0.70
          STAT_LOW     = 0.05
          STAT_HIGH    = 0.85

          if not edges_path.exists():
              print(f"[DRIFT] No publishable_edges.parquet at {edges_path} — "
                    "no games today or edge report failed. Skipping drift monitor.")
              sys.exit(0)

          df = pd.read_parquet(edges_path)
          if df.empty:
              print("[DRIFT] Edge report is empty (no bettable props). Skipping drift monitor.")
              sys.exit(0)

          # Determine %OVER: prefer explicit direction column, then p_over, then edge_pp sign
          def compute_pct_over(subset):
              if "direction" in subset.columns:
                  n_over = (subset["direction"].str.upper() == "OVER").sum()
              elif "p_over" in subset.columns:
                  n_over = (subset["p_over"] > 0.5).sum()
              elif "edge_pp" in subset.columns:
                  n_over = (subset["edge_pp"] > 0).sum()
              else:
                  return None
              return n_over / len(subset) if len(subset) > 0 else None

          overall_pct = compute_pct_over(df)
          if overall_pct is None:
              print("[DRIFT] Cannot determine OVER/UNDER direction — no direction/p_over/edge_pp column. "
                    "Skipping drift monitor.")
              sys.exit(0)

          # Per-stat breakdown
          stat_col = next((c for c in ["stat", "market", "prop_type"] if c in df.columns), None)

          stat_results = {}
          alerts = []

          print(f"[DRIFT] ============= Prediction Drift Monitor =============")
          print(f"[DRIFT] Total bettable props: {len(df)}")
          print(f"[DRIFT] Overall %%OVER: {overall_pct:.1%} "
                f"(thresholds: <{OVERALL_LOW:.0%} or >{OVERALL_HIGH:.0%})")

          if overall_pct < OVERALL_LOW or overall_pct > OVERALL_HIGH:
              alerts.append(f"overall: {overall_pct:.1%}")
              print(f"\n{'='*60}")
              print(f"WARNING: OVERALL %%OVER = {overall_pct:.1%} is OUTSIDE normal range "
                    f"[{OVERALL_LOW:.0%}, {OVERALL_HIGH:.0%}]")
              print(f"{'='*60}\n")
          else:
              print(f"[DRIFT] Overall %%OVER OK: {overall_pct:.1%}")

          if stat_col:
              for stat in STAT_COLS:
                  sub = df[df[stat_col].str.lower() == stat] if len(df) > 0 else df
                  if len(sub) == 0:
                      print(f"[DRIFT]   {stat}: no rows (not in today's slate)")
                      continue
                  pct = compute_pct_over(sub)
                  if pct is None:
                      continue
                  stat_results[stat] = {"pct_over": round(float(pct), 4), "n": int(len(sub))}
                  flag = ""
                  if pct < STAT_LOW or pct > STAT_HIGH:
                      alerts.append(f"{stat}: {pct:.1%}")
                      flag = " <== DRIFT ALERT"
                      print(f"[DRIFT]   {stat}: %%OVER={pct:.1%} (n={len(sub)}) "
                            f"OUTSIDE [{STAT_LOW:.0%}, {STAT_HIGH:.0%}]{flag}")
                  else:
                      print(f"[DRIFT]   {stat}: %%OVER={pct:.1%} (n={len(sub)}) OK")
          else:
              print("[DRIFT] No stat column found — skipping per-stat breakdown")

          drift_alert = len(alerts) > 0

          if drift_alert:
              print(f"\n{'!'*60}")
              print(f"DRIFT_ALERT TRIGGERED — affected: {', '.join(alerts)}")
              print(f"Model is still deploying. Review calibrators and bias corrections.")
              print(f"{'!'*60}\n")
              if github_env:
                  with open(github_env, "a") as fh:
                      fh.write("DRIFT_ALERT=true\n")

              # Write JSON summary
              audit_dir.mkdir(parents=True, exist_ok=True)
              report = {
                  "generated_at": datetime.now(timezone.utc).isoformat(),
                  "game_date": game_date,
                  "overall_pct_over": round(float(overall_pct), 4),
                  "overall_n": int(len(df)),
                  "thresholds": {
                      "overall_low": OVERALL_LOW, "overall_high": OVERALL_HIGH,
                      "stat_low": STAT_LOW, "stat_high": STAT_HIGH,
                  },
                  "stat_results": stat_results,
                  "alerts": alerts,
              }
              date_tag = datetime.now(timezone.utc).strftime("%Y%m%d")
              out_path = audit_dir / f"drift_alert_{date_tag}.json"
              out_path.write_text(json.dumps(report, indent=2))
              print(f"[DRIFT] Alert report written to {out_path}")
          else:
              print("[DRIFT] No drift detected. All stats within normal ranges.")

          print("[DRIFT] ============= Drift Monitor Complete =============")
          PYEOF
        env:
          GAME_DATE: ${{ env.GAME_DATE }}
        continue-on-error: true

