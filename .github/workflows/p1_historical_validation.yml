name: P1 Historical Validation (offline)

# Offline historical market backfill + Under-lean grading. Does NOT touch
# production forecasts, calibration artifacts, publishing, or public pages.
# Fired via the sentinel file (workflow_dispatch is unavailable to app tokens).
on:
  workflow_dispatch:
    inputs:
      pilot_dates:
        description: "Pilot: limit to first N eligible dates before full run (0 = full only)"
        required: false
        default: "6"
  push:
    branches: [main]
    paths:
      - .github/p1_run.trigger

jobs:
  p1-historical-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    timeout-minutes: 240
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"

      - name: Secret preflight (presence only — never printed)
        run: |
          test -n "$ODDS_API_KEY" || { echo "[FATAL] ODDS_API_KEY secret missing"; exit 1; }
          test -n "$BDL_API_KEY"  || { echo "[FATAL] BDL_API_KEY secret missing"; exit 1; }
          echo "Secrets present (values not shown)."

      - name: Pull BDL history + build canonical games/roster
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py --start-season 2023 --end-season "$YEAR" --out-dir data/raw/bdl
          python scripts/build_canonical_tables.py --raw-dir data/raw/bdl --out-dir data/processed

      - name: Download latest OOF (raw, fold-safe)
        run: |
          mkdir -p data/oof
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=oof-latest" \
            --jq '[.artifacts[] | select(.expired==false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -z "$AID" ] || [ "$AID" = "null" ]; then echo "[FATAL] oof-latest artifact not found" && exit 1; fi
          gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/oof.zip
          unzip -o /tmp/oof.zip -d data/oof
          test -s data/oof/oof_player_stat_pmfs.parquet || { echo "[FATAL] OOF parquet missing"; exit 1; }

      - name: Step 1 — sanitized API preflight
        run: |
          python scripts/p1_historical_backfill.py \
            --oof data/oof/oof_player_stat_pmfs.parquet \
            --games data/processed/wnba_games.parquet \
            --roster data/processed/wnba_player_game_stats.parquet \
            --out-dir artifacts/p1 --cache-dir artifacts/p1_cache --preflight-only

      - name: Step 3 — pilot backfill
        run: |
          python scripts/p1_historical_backfill.py \
            --oof data/oof/oof_player_stat_pmfs.parquet \
            --games data/processed/wnba_games.parquet \
            --roster data/processed/wnba_player_game_stats.parquet \
            --out-dir artifacts/p1_pilot --cache-dir artifacts/p1_cache \
            --pilot-dates ${{ github.event.inputs.pilot_dates || '6' }}

      - name: Steps 2-4 — full backfill (resumes from pilot cache)
        run: |
          python scripts/p1_historical_backfill.py \
            --oof data/oof/oof_player_stat_pmfs.parquet \
            --games data/processed/wnba_games.parquet \
            --roster data/processed/wnba_player_game_stats.parquet \
            --out-dir artifacts/p1 --cache-dir artifacts/p1_cache

      - name: Steps 5-8 — evaluate + forced verdict
        run: |
          python scripts/p1_build_evaluation.py \
            --oof data/oof/oof_player_stat_pmfs.parquet \
            --closing-consensus artifacts/p1/p1_closing_consensus.parquet \
            --out-dir artifacts/p1

      - name: Print verdict (no secrets)
        if: always()
        run: |
          echo "=== P1 coverage summary ==="; cat artifacts/p1/p1_coverage_summary.json 2>/dev/null || true
          echo "=== P1 results ==="; cat artifacts/p1/p1_results.json 2>/dev/null || true
          echo "=== P1 report ==="; cat artifacts/p1/p1_validation_report.md 2>/dev/null || true

      - name: Upload P1 artifacts (data + audits + report)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: p1-historical-validation-${{ github.run_id }}
          path: |
            artifacts/p1/
          retention-days: 90
