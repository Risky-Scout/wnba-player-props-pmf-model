name: Live In-Play Tracker

on:
  schedule:
    # Run every 5 minutes during typical WNBA game windows (6 PM - 11 PM ET = 22:00-03:00 UTC)
    # Saturday-Wednesday (most WNBA games)
    - cron: '*/5 22-23,0-3 * * 6,0,1,2,3'
    # Friday games
    - cron: '*/5 22-23,0-3 * * 5'
    # Thursday games (some)
    - cron: '*/5 22-23,0-3 * * 4'

  workflow_dispatch:
    inputs:
      game_id:
        description: 'Specific game ID(s) to track (space-separated). Leave empty to auto-detect.'
        required: false
        default: ''
      game_ids:
        description: 'Space-separated game IDs passed by self-chain. Skips BDL discovery.'
        required: false
        default: ''
      duration_minutes:
        description: 'How long to track in minutes (default 5 for per-poll sessions)'
        required: false
        default: '5'
      poll_interval:
        description: 'Seconds between polls (default 5)'
        required: false
        default: '5'

jobs:
  find-games:
    name: Find Active WNBA Games
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    timeout-minutes: 5
    outputs:
      has_games: ${{ steps.find.outputs.has_games }}
      game_ids: ${{ steps.find.outputs.game_ids }}
      date: ${{ steps.find.outputs.date }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Find active games
        id: find
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          # If specific game_ids provided (via self-chain or manual trigger), use those
          EXPLICIT_IDS="${{ github.event.inputs.game_ids }}"
          if [ -z "$EXPLICIT_IDS" ]; then
            EXPLICIT_IDS="${{ github.event.inputs.game_id }}"
          fi
          if [ -n "$EXPLICIT_IDS" ]; then
            GAME_IDS="$EXPLICIT_IDS"
            echo "has_games=true" >> $GITHUB_OUTPUT
            echo "game_ids=$GAME_IDS" >> $GITHUB_OUTPUT
            echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
            echo "Using pre-specified game IDs: $GAME_IDS"
          else
            mkdir -p artifacts/live
            python scripts/find_live_games.py --out-dir artifacts/live
          fi

      - name: Upload games info
        if: steps.find.outputs.has_games == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-games-info
          path: artifacts/live/live_games.json
          retention-days: 1

  track-live:
    name: Track Live Props
    needs: find-games
    if: needs.find-games.outputs.has_games == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Download pre-game projections
        id: download_projections
        uses: actions/download-artifact@v4
        with:
          # daily_pipeline.yml uploads as daily-delivery-{date}-{run_id} (includes run_id).
          # Use pattern: to match any run_id for the given date; merge-multiple: true
          # merges all matching artifacts into the download path.
          pattern: daily-delivery-${{ needs.find-games.outputs.date }}-*
          merge-multiple: true
          path: deliveries/today/
        continue-on-error: true

      - name: Check projections
        run: |
          if [ -f "deliveries/today/full_pmfs_wide.parquet" ]; then
            echo "Pre-game projections loaded."
          else
            echo "[WARN] No pre-game projections found for ${{ needs.find-games.outputs.date }}"
            mkdir -p deliveries/today
          fi

      - name: Normalize projections path
        # daily-delivery artifacts contain deliveries/next_game/full_pmfs_wide.parquet
        # internally, so after download to deliveries/today/ the file lands at
        # deliveries/today/deliveries/next_game/full_pmfs_wide.parquet (double-nested).
        # Flatten it to deliveries/today/full_pmfs_wide.parquet where run_live_tracker.py
        # expects it (_DEFAULT_PROJECTIONS = "deliveries/today/full_pmfs_wide.parquet").
        run: |
          if [ ! -f "deliveries/today/full_pmfs_wide.parquet" ]; then
            NESTED=$(find deliveries/today -name "full_pmfs_wide.parquet" 2>/dev/null | head -1)
            if [ -n "$NESTED" ]; then
              cp "$NESTED" deliveries/today/full_pmfs_wide.parquet
              echo "Normalized projections from $NESTED → deliveries/today/full_pmfs_wide.parquet"
            else
              echo "[WARN] No full_pmfs_wide.parquet found anywhere under deliveries/today/"
            fi
          else
            echo "Projections already at expected path."
          fi
        continue-on-error: true

      - name: Poll live scores from Odds API (pre-tracker)
        # Fetch live score snapshot before the tracker starts so we have
        # a baseline game score. Written to artifacts/live/live_scores_oddsapi.json.
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          if [ -n "$ODDS_API_KEY" ]; then
            python - <<'EOF'
          import os, json, sys
          sys.path.insert(0, "src")
          from pathlib import Path
          try:
              from wnba_props_model.data.odds_api_client import OddsAPIClient
              client = OddsAPIClient(api_key=os.environ["ODDS_API_KEY"])
              scores = client.get_scores(days_from=1)
              Path("artifacts/live").mkdir(parents=True, exist_ok=True)
              Path("artifacts/live/live_scores_oddsapi.json").write_text(
                  json.dumps(scores, indent=2)
              )
              live = [s for s in scores if not s.get("completed")]
              print(f"[OddsAPI] {len(live)} live games | {len(scores)} total scores fetched")
          except Exception as e:
              print(f"[WARN] Odds API score poll failed: {e}")
          EOF
          fi
        continue-on-error: true

      - name: Run live tracker
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || '5' }}
          POLL=${{ github.event.inputs.poll_interval || '5' }}
          GAME_IDS="${{ needs.find-games.outputs.game_ids }}"

          # Convert space-separated IDs to --game-ids arguments
          ARGS=""
          for gid in $GAME_IDS; do
            ARGS="$ARGS --game-ids $gid"
          done

          mkdir -p artifacts/live
          python scripts/run_live_tracker.py \
            $ARGS \
            --duration $DURATION \
            --poll-interval $POLL \
            --out-dir artifacts/live/

      - name: Upload live edges
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-edges-${{ github.run_number }}-${{ needs.find-games.outputs.date }}
          path: artifacts/live/
          retention-days: 7

      - name: Format live JSON outputs per game
        if: always()
        run: |
          mkdir -p tools/odds-scanner/predictions/WNBA/Inplay-Edge
          mkdir -p tools/odds-scanner/predictions/WNBA/Inplay/Edges
          GAME_IDS="${{ needs.find-games.outputs.game_ids }}"
          if [ -n "$GAME_IDS" ]; then
            for GID in $GAME_IDS; do
              echo "Formatting live output for game $GID"
              python scripts/format_live_output.py \
                --live-dir artifacts/live \
                --out-dir tools/odds-scanner/predictions/WNBA/Inplay-Edge \
                --game-id $GID
            done
            # write_active_games_json.py reads IDS (comma-separated) from env.
            # GAME_IDS is space-separated from find-games output; convert before calling.
            IDS_CSV=$(echo "$GAME_IDS" | tr ' ' ',')
            IDS="$IDS_CSV" GAME_DATE="${{ needs.find-games.outputs.date }}" python scripts/write_active_games_json.py
          fi
          # Aggregate game_*_latest.json → Inplay/Edges/latest.json so that
          # generate_web_pages.py (--live-dir) finds a populated index file.
          python3 - <<'PYEOF'
          import json
          from pathlib import Path
          from datetime import datetime, timezone
          inplay_src = Path("tools/odds-scanner/predictions/WNBA/Inplay-Edge")
          out = Path("tools/odds-scanner/predictions/WNBA/Inplay/Edges")
          out.mkdir(parents=True, exist_ok=True)
          games = []
          for gf in sorted(inplay_src.glob("game_*_latest.json")):
              try:
                  games.append(json.loads(gf.read_text()))
              except Exception:
                  pass
          payload = {
              "schema_version": "2.0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "active_games": len(games),
              "games": games,
          }
          (out / "latest.json").write_text(json.dumps(payload, separators=(",", ":")))
          print(f"Inplay/Edges latest.json: {len(games)} active game(s)")
          PYEOF
          # Generate live web page now that Inplay/Edges/latest.json exists
          python scripts/generate_web_pages.py \
            --game-date "${{ needs.find-games.outputs.date }}" \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game \
            --live-dir tools/odds-scanner/predictions/WNBA/Inplay/Edges
        continue-on-error: true
        env:
          GAME_DATE: ${{ needs.find-games.outputs.date }}

      - name: Publish live edges to gh-pages (Inplay-Edge path)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tools/odds-scanner/predictions/WNBA/Inplay-Edge
          publish_branch: gh-pages
          destination_dir: tools/odds-scanner/predictions/WNBA/Inplay-Edge
          keep_files: true

      - name: Publish live edges to gh-pages (Inplay/Edges path)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tools/odds-scanner/predictions/WNBA/Inplay/Edges
          publish_branch: gh-pages
          destination_dir: tools/odds-scanner/predictions/WNBA/Inplay/Edges
          keep_files: true

      - name: Publish live edges to gh-pages (In-Play/Edges canonical URL)
        if: always()
        run: |
          mkdir -p tools/odds-scanner/predictions/WNBA/In-Play/Edges
          # Mirror Inplay/Edges content to In-Play/Edges for the canonical URL
          if [ -f "tools/odds-scanner/predictions/WNBA/Inplay/Edges/latest.json" ]; then
            cp tools/odds-scanner/predictions/WNBA/Inplay/Edges/latest.json \
               tools/odds-scanner/predictions/WNBA/In-Play/Edges/latest.json
          fi
          if [ -f "tools/odds-scanner/predictions/WNBA/Inplay/Edges/index.html" ]; then
            cp tools/odds-scanner/predictions/WNBA/Inplay/Edges/index.html \
               tools/odds-scanner/predictions/WNBA/In-Play/Edges/index.html
          fi
        continue-on-error: true

      - name: Publish In-Play Edges to gh-pages (canonical /In-Play/Edges/ URL)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tools/odds-scanner/predictions/WNBA/In-Play/Edges
          publish_branch: gh-pages
          destination_dir: tools/odds-scanner/predictions/WNBA/In-Play/Edges
          keep_files: true

      - name: Self-chain if games still active
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GAME_IDS="${{ needs.find-games.outputs.game_ids }}"
          if [ -z "$GAME_IDS" ]; then
            echo "No game_ids to self-chain with — skipping."
            exit 0
          fi
          # Only self-chain during WNBA game hours (22:00–04:00 UTC)
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 4 ] && [ "$HOUR" -lt 22 ]; then
            echo "Outside WNBA game window (UTC hour $HOUR) — not self-chaining."
            exit 0
          fi
          # Also verify at least one BDL game still exists for today before re-queuing.
          ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          GAMES_LIVE=$(curl -sf \
            "https://api.balldontlie.io/wnba/v1/games?dates[]=$ET_DATE&per_page=10" \
            -H "Authorization: ${{ secrets.BDL_API_KEY }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); live=[g for g in d.get('data',[]) if g.get('status') not in ('Final','Post Game','','canceled','postponed')]; print(len(live))" \
            2>/dev/null || echo "0")
          if [ "$GAMES_LIVE" = "0" ]; then
            echo "No live games found for $ET_DATE — not self-chaining to prevent runaway loop."
            exit 0
          fi
          echo "Self-chaining live tracker for game IDs: $GAME_IDS ($GAMES_LIVE live games)"
          gh workflow run live_tracker.yml \
            --ref ${{ github.ref_name }} \
            --field game_ids="$GAME_IDS" \
            --field duration_minutes="5" \
            --field poll_interval="5"

      - name: Summary
        if: always()
        run: |
          if [ -f "artifacts/live/live_session_summary.json" ]; then
            echo "=== Live Session Summary ==="
            python3 -c "import json; d=json.load(open('artifacts/live/live_session_summary.json')); print('Games tracked:', d.get('game_ids',[])); print('Total polls:', d.get('n_polls',0)); print('Bettable edges found:', d.get('n_bettable_edges_total',0)); edges=d.get('bettable_edges',[])[:5]; [print('  player={} {} {} edge={:+.1f}pp'.format(e.get('player_id'),e.get('stat'),str(e.get('direction','')).upper(),e.get('edge_pp',0))) for e in edges]"
          fi
          if [ -f "artifacts/live/live_scores_oddsapi.json" ]; then
            echo "=== Odds API Live Scores ==="
            python3 -c "import json; scores=json.load(open('artifacts/live/live_scores_oddsapi.json')); live=[s for s in scores if not s.get('completed')]; [print('  {} @ {} - {}'.format(s.get('away_team','?'),s.get('home_team','?'),' | '.join('{}: {}'.format(x.get('name','?'),x.get('score','?')) for x in (s.get('scores') or [])))) for s in live] or print('  No live games in Odds API scores snapshot')"
          fi
