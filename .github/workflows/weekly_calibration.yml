name: Weekly OOF Refresh & Calibration

on:
  schedule:
    - cron: "0 10 * * 1"   # Monday 6 AM ET (UTC-4)
  workflow_dispatch:
    inputs:
      force_refit:
        description: "Force calibrator refit even if gates would pass"
        required: false
        default: "false"

jobs:
  weekly-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Pull BDL history (current season)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl

      - name: Build canonical tables
        run: |
          python scripts/build_canonical_tables.py \
            --raw-dir data/raw/bdl \
            --out-dir data/processed \
            --audit-out artifacts/audits/canonical_schema_audit.json

      - name: Build features
        run: |
          python scripts/build_features.py \
            --canonical-dir data/processed \
            --out-dir data/processed \
            --audit-out artifacts/audits/feature_audit.json

      - name: Build OOF PMFs (Stage 5)
        run: |
          python scripts/build_oof_pmfs.py \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --features-long data/processed/wnba_player_game_features_long.parquet \
            --manifest data/processed/feature_schema_manifest.json \
            --config config/model/stage5_oof.yaml \
            --out-dir data/oof \
            --audit-out artifacts/audits/stage5_oof_audit.json

      - name: Validate OOF PMFs
        run: |
          python scripts/validate_oof_pmfs.py \
            --oof-pmfs data/oof/oof_player_stat_pmfs.parquet \
            --fold-manifest data/oof/oof_fold_manifest.parquet \
            --audit-out artifacts/audits/stage5_oof_pmf_validation_audit.json

      - name: Score OOF PMFs (pre-calibration)
        run: |
          python scripts/score_oof_pmfs.py \
            --oof-pmfs data/oof/oof_player_stat_pmfs.parquet \
            --audit-out artifacts/audits/stage5_oof_scoring_audit.json \
            --summary-out artifacts/audits/stage5_oof_summary.md

      - name: Fit calibrators (Stage 6)
        run: |
          python scripts/fit_calibrators.py \
            --oof-pmfs data/oof/oof_player_stat_pmfs.parquet \
            --out-dir artifacts/models/calibration

      - name: Verify calibration gates
        id: gates
        run: |
          python scripts/verify_gates.py calibration \
            data/oof/oof_player_stat_pmfs.parquet \
            --config config/model/stage6_calibration.yaml \
            --ece-threshold 0.03 \
            --ks-threshold 0.075
        # Fails workflow if ECE > 0.03 for any stat — blocks bad calibrators from production

      - name: Upload calibrators (only on gate pass)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: calibrators-latest
          path: artifacts/models/calibration/
          retention-days: 90

      - name: Upload OOF audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-cal-audit-${{ github.run_id }}
          path: |
            data/oof/
            artifacts/audits/stage5_*
          retention-days: 30
