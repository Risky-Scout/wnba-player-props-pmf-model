# Live In-Play Engine -- blueprint S11.2
# Runs every 2 minutes during WNBA game windows when WNBA_SEASON_ACTIVE=true.
# Polls BDL PBP, updates Gamma-Poisson posteriors, publishes live JSON.
#
# Delivery URL: https://sportsodds.wizardofodds.com/tools/odds-scanner/
#               predictions/WNBA/Inplay-Edge/game_{id}_latest.json
#
# Required vars:   WNBA_SEASON_ACTIVE (repo variable, set to "true" to enable)
# Required secrets: BDL_API_KEY, ODDS_API_KEY, DEPLOY_TOKEN
name: Live In-Play Engine

on:
  schedule:
    # Only run during WNBA season months (May–October, months 5-10).
    # October covers playoff extension. Saves ~9,500 Actions minutes/year
    # vs the original */2 * * * *.
    - cron: '*/10 * * 5,6,7,8,9,10 *'
  workflow_dispatch:
    inputs:
      game_ids:
        description: 'Comma-separated BDL game IDs to track (leave blank for auto-detect)'
        required: false
        default: ''

jobs:
  live_inplay:
    runs-on: ubuntu-latest
    # Only run during active WNBA season and on game days (blueprint S11.2)
    if: ${{ vars.WNBA_SEASON_ACTIVE == 'true' }}
    permissions:
      contents: write
      actions: write
      pages: write
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      # Fast BDL schedule pre-check before any expensive setup.
      # Exits the entire workflow in ~3 s on non-game days instead of ~45 s.
      # Checks BOTH the ET date and the next UTC date because BDL stores late-night
      # ET games (after 8 PM ET / midnight UTC) under the following UTC day.
      - name: Check if WNBA games exist today (fast pre-check)
        id: schedule_check
        run: |
          ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          UTC_DATE=$(date -u +%Y-%m-%d)
          echo "Pre-check: ET=$ET_DATE UTC=$UTC_DATE"
          _check_date() {
            curl -sf \
              "https://api.balldontlie.io/wnba/v1/games?dates[]=$1&per_page=1" \
              -H "Authorization: ${{ secrets.BDL_API_KEY }}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('data') and len(d['data'])>0 else 'false')" \
              2>/dev/null || echo "false"
          }
          GAMES_ET=$(_check_date "$ET_DATE")
          GAMES_UTC=$(_check_date "$UTC_DATE")
          if [ "$GAMES_ET" = "true" ] || [ "$GAMES_UTC" = "true" ]; then
            GAMES_TODAY="true"
          else
            GAMES_TODAY="false"
          fi
          echo "has_games=$GAMES_TODAY" >> $GITHUB_OUTPUT
          echo "ET games: $GAMES_ET | UTC games: $GAMES_UTC | combined: $GAMES_TODAY"
          if [ "$GAMES_TODAY" = "false" ]; then
            echo "No WNBA games on ET=$ET_DATE or UTC=$UTC_DATE — exiting early"
          fi

      - uses: actions/checkout@v4
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'

      - name: Setup Python 3.11
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -e ".[dev]"

      - name: Detect today's date (ET)
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          echo "GAME_DATE=$ET_DATE" >> $GITHUB_ENV
          echo "ARTIFACT_DATE=$ET_DATE" >> $GITHUB_ENV

      - name: Find active WNBA games
        id: find_games
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python scripts/find_live_games.py \
            --out-dir artifacts/live \
            --date "$GAME_DATE" \
            --live-only
          # Read game IDs from live_games.json (primary) or active_game_ids.txt (fallback)
          if [ -f "artifacts/live/live_games.json" ]; then
            ACTIVE_IDS=$(python -c "import json; d=json.load(open('artifacts/live/live_games.json')); print(','.join(str(g) for g in d.get('game_ids',[])) if d.get('has_games') else '')")
            echo "ACTIVE_GAME_IDS=$ACTIVE_IDS" >> $GITHUB_ENV
            echo "Found active games: $ACTIVE_IDS"
          elif [ -f "artifacts/live/active_game_ids.txt" ]; then
            ACTIVE_IDS=$(cat artifacts/live/active_game_ids.txt)
            echo "ACTIVE_GAME_IDS=$ACTIVE_IDS" >> $GITHUB_ENV
            echo "Found active games (txt): $ACTIVE_IDS"
          else
            echo "ACTIVE_GAME_IDS=" >> $GITHUB_ENV
            echo "No active games found"
          fi
        continue-on-error: true

      - name: Resolve artifact date from BDL game date
        if: steps.schedule_check.outputs.has_games == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # BDL stores late-night ET games (after 8 PM ET / midnight UTC) under
          # the next UTC date. Use the BDL-authoritative game date for artifact
          # lookups so pre-game projections are found correctly.
          if [ -f "artifacts/live/live_games.json" ]; then
            BDL_DATE=$(python3 -c "import json; d=json.load(open('artifacts/live/live_games.json')); games=d.get('games',[]); print(games[0]['date'] if games else d.get('date',''))" 2>/dev/null)
            if [ -n "$BDL_DATE" ] && [ "$BDL_DATE" != "$GAME_DATE" ]; then
              echo "BDL game date ($BDL_DATE) differs from ET date ($GAME_DATE) — using BDL date for artifact lookup"
              echo "ARTIFACT_DATE=$BDL_DATE" >> $GITHUB_ENV
            fi
          fi

      # Only continue if there are active games
      - name: Check active games
        run: |
          if [ -z "$ACTIVE_GAME_IDS" ] && [ -z "${{ github.event.inputs.game_ids }}" ]; then
            echo "No active games -- exiting early"
            echo "NO_GAMES=true" >> $GITHUB_ENV
          fi

      - name: Download pre-game projections (cross-run via GitHub CLI)
        if: env.NO_GAMES != 'true'
        run: |
          mkdir -p deliveries/tonight
          # Try today's final predictions first, then fall back to initial predictions
          for ARTIFACT_NAME in "pregame-final-${{ env.ARTIFACT_DATE }}" "pregame-initial-${{ env.ARTIFACT_DATE }}"; do
            AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=${ARTIFACT_NAME}" \
              --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
            if [ -n "$AID" ] && [ "$AID" != "null" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/pregame.zip
              # Unzip to repo root so paths like deliveries/tonight/full_pmfs_wide.parquet
              # land at the correct relative location (not double-nested).
              unzip -o /tmp/pregame.zip -d .
              echo "Pre-game artifact downloaded: ${ARTIFACT_NAME} (id=$AID)"
              break
            fi
          done
          # Verify the parquet is reachable; warn if not
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            echo "[WARN] full_pmfs_wide.parquet not found after artifact download — live tracker will run without pregame priors"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Fetch PBP data for active games (BDL)
        if: env.NO_GAMES != 'true'
        run: |
          IDS="${{ github.event.inputs.game_ids || env.ACTIVE_GAME_IDS }}"
          if [ -n "$IDS" ]; then
            # Typer List[int] options require one --game-ids flag per value.
            GAME_ID_FLAGS=$(echo "$IDS" | tr ',' '\n' | awk '{print "--game-ids " $1}' | tr '\n' ' ')
            python scripts/run_live_tracker.py \
              $GAME_ID_FLAGS \
              --duration 3 \
              --poll-interval 30 \
              --out-dir artifacts/live \
              --projections deliveries/tonight/full_pmfs_wide.parquet
          fi
        continue-on-error: true

      - name: Fetch live props from BDL
        if: env.NO_GAMES != 'true'
        run: |
          python scripts/pull_live_props.py \
            --out-dir data/live/bdl_props
        continue-on-error: true

      - name: Fetch live props + deep links from Odds API
        if: env.NO_GAMES != 'true'
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/live/oddsapi_props
        continue-on-error: true

      - name: Format live JSON outputs per game (blueprint S4)
        if: env.NO_GAMES != 'true'
        run: |
          IDS="${{ github.event.inputs.game_ids || env.ACTIVE_GAME_IDS }}"
          mkdir -p tools/odds-scanner/predictions/WNBA/Inplay-Edge
          if [ -n "$IDS" ]; then
            for GID in $(echo $IDS | tr ',' ' '); do
              echo "Formatting live output for game $GID"
              python scripts/format_live_output.py \
                --live-dir artifacts/live \
                --out-dir tools/odds-scanner/predictions/WNBA/Inplay-Edge \
                --game-id $GID
            done
            # Write active_games.json index so the dashboard can discover live games
            python3 scripts/write_active_games_json.py
          fi
        continue-on-error: true
        env:
          IDS: ${{ github.event.inputs.game_ids || env.ACTIVE_GAME_IDS }}
          GAME_DATE: ${{ env.GAME_DATE }}

      - name: Quarter-break calibration check
        if: env.NO_GAMES != 'true'
        run: |
          python - << 'EOF'
          # Live calibration health check every quarter break
          import json
          from pathlib import Path

          summary_path = Path("artifacts/live/live_session_summary.json")
          if not summary_path.exists():
              print("No live session summary found -- skipping cal check")
              exit(0)

          summary = json.loads(summary_path.read_text())
          clock = summary.get("current_clock", "10:00")
          period = summary.get("current_period", 1)

          # Quarter break = clock near 0:00 or period transition
          try:
              mins, secs = map(int, clock.split(":"))
              at_break = mins == 0 and secs <= 30
          except Exception:
              at_break = False

          if at_break:
              print(f"Quarter break detected at Q{period} {clock} -- running recal check")
              import subprocess
              subprocess.run(["python", "scripts/live_recal_check.py",
                              "--live-dir", "artifacts/live"], check=False)
          else:
              print(f"Mid-quarter at Q{period} {clock} -- no recal needed")
          EOF
        continue-on-error: true

      - name: Score predictions for CLV tracking
        if: env.NO_GAMES != 'true'
        run: |
          python scripts/score_predictions.py \
            --delivery-dir deliveries/ \
            --out data/clv_tracking/drift_window.parquet
        continue-on-error: true

      - name: Capture closing odds for CLV
        if: env.NO_GAMES != 'true'
        run: |
          python scripts/pull_closing_lines.py \
            --game-date "$GAME_DATE" \
            --out-dir data/live/closing_odds
        continue-on-error: true

      - name: Generate Inplay/Edges web page JSON + HTML
        if: env.NO_GAMES != 'true'
        run: |
          # Aggregate all active game live outputs into a single flat edges JSON
          # that the Inplay/Edges/index.html page fetches.
          mkdir -p tools/odds-scanner/predictions/WNBA/In-Play/Edges
          python - <<'PYEOF'
          import json, os, glob
          from datetime import datetime, timezone
          from pathlib import Path

          inplay_src = Path("tools/odds-scanner/predictions/WNBA/Inplay-Edge")
          out = Path("tools/odds-scanner/predictions/WNBA/In-Play/Edges")
          out.mkdir(parents=True, exist_ok=True)

          game_files = sorted(inplay_src.glob("game_*_latest.json"))
          games = []
          for gf in game_files:
              try:
                  games.append(json.loads(gf.read_text()))
              except Exception:
                  pass

          payload = {
              "schema_version": "2.0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "active_games": len(games),
              "games": games,
          }
          (out / "latest.json").write_text(json.dumps(payload, separators=(",", ":")))
          print(f"In-Play/Edges latest.json: {len(games)} active games")
          PYEOF

          # Write live index.html via generate_web_pages (--skip-live-html=false for this run)
          python scripts/generate_web_pages.py \
            --game-date "$GAME_DATE" \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game \
            --live-dir tools/odds-scanner/predictions/WNBA/In-Play/Edges
        continue-on-error: true

      - name: Stage live outputs for single gh-pages deploy
        if: env.NO_GAMES != 'true'
        run: |
          DIRS=(
            "tools/odds-scanner/predictions/WNBA/Inplay-Edge"
            "tools/odds-scanner/predictions/WNBA/In-Play/Edges"
          )
          for DIR in "${DIRS[@]}"; do
            if [ -d "$DIR" ]; then
              mkdir -p "_site/${DIR}"
              cp -r "${DIR}/." "_site/${DIR}/"
            fi
          done
          echo "Staged live files: $(find _site -type f | wc -l)"

      - name: Deploy live pages to gh-pages (single push — no race condition)
        if: env.NO_GAMES != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true

      - name: Deploy WNBA pages to sportsodds.wizardofodds.com via FTP
        if: env.NO_GAMES != 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/ftp_deploy.py
        continue-on-error: true

      - name: Post-game archive (runs when all games final)
        if: env.NO_GAMES != 'true'
        run: |
          IDS="${{ github.event.inputs.game_ids || env.ACTIVE_GAME_IDS }}"
          if [ -n "$IDS" ]; then
            for GID in $(echo $IDS | tr ',' ' '); do
              # Check if game is final
              GAME_FILE="tools/odds-scanner/predictions/WNBA/Inplay-Edge/game_${GID}_latest.json"
              if [ -f "$GAME_FILE" ]; then
                STATUS=$(python -c "import json; d=json.load(open('$GAME_FILE')); print(d.get('game_status',''))")
                if [ "$STATUS" = "final" ]; then
                  echo "Game $GID is final -- archiving"
                  python scripts/format_live_output.py \
                    --live-dir artifacts/live \
                    --out-dir tools/odds-scanner/predictions/WNBA/Inplay-Edge \
                    --game-id $GID \
                    --archive
                fi
              fi
            done
          fi
        continue-on-error: true

      - name: Upload live artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-inplay-${{ env.GAME_DATE }}-${{ github.run_number }}
          path: |
            artifacts/live/
            tools/odds-scanner/predictions/WNBA/Inplay-Edge/
          retention-days: 7

      - name: Self-chain if games still active (replaces unreliable cron)
        if: env.NO_GAMES != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IDS="${{ github.event.inputs.game_ids || env.ACTIVE_GAME_IDS }}"
          if [ -z "$IDS" ]; then
            echo "No game IDs tracked this run — skipping self-chain."
            exit 0
          fi

          # Check each tracked game's latest JSON to see if it is still live.
          STILL_LIVE=""
          for GID in $(echo "$IDS" | tr ',' ' '); do
            GAME_FILE="tools/odds-scanner/predictions/WNBA/Inplay-Edge/game_${GID}_latest.json"
            if [ -f "$GAME_FILE" ]; then
              GAME_STATUS=$(python3 - <<PYEOF
          import json
          try:
              s = json.load(open("${GAME_FILE}")).get("game_status", "").lower()
              t = {"final", "final/ot", "final_ot", "canceled", "postponed", "post"}
              print("done" if s in t else "live")
          except Exception:
              print("live")
          PYEOF
              )
              if [ "$GAME_STATUS" = "live" ]; then
                STILL_LIVE="$STILL_LIVE,$GID"
              else
                echo "Game $GID finished (game_status=$GAME_STATUS) — not re-queuing"
              fi
            else
              echo "Game $GID — no output file found, including in self-chain as precaution"
              STILL_LIVE="$STILL_LIVE,$GID"
            fi
          done
          STILL_LIVE="${STILL_LIVE#,}"  # strip leading comma

          if [ -n "$STILL_LIVE" ]; then
            echo "Games still live: $STILL_LIVE"
            echo "Sleeping 5 minutes then triggering next poll cycle..."
            sleep 300
            gh workflow run live_inplay.yml \
              --repo Risky-Scout/wnba-player-props-pmf-model \
              -f game_ids="$STILL_LIVE"
            echo "Self-chain triggered for: $STILL_LIVE"
          else
            echo "All games finished — self-chain terminates. No further runs queued."
          fi
