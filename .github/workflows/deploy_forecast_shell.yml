name: Deploy forecast-only Edge shell (one-time)

# Controlled, one-time deploy of the forecast-only Edge page SHELL (index.html),
# which hides betting affordances and shows the explicit abstention state. Routine
# daily runs never touch shells (ftp_deploy uploads .json only); this workflow opts
# in via --include-html and --no-wipe so the live abstaining latest.json is preserved.
# Fired by pushing the sentinel .github/deploy_shell.trigger to main.
on:
  push:
    branches: [main]
    paths:
      - .github/deploy_shell.trigger
  workflow_dispatch:

jobs:
  deploy-forecast-shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"

      - name: Secret preflight (presence only)
        run: |
          test -n "$FTP_HOST" && test -n "$FTP_USER" && test -n "$FTP_PASS" \
            || { echo "[FATAL] FTP_* secrets missing"; exit 1; }
          echo "FTP secrets present."

      - name: Write forecast-only shells (index.html ONLY per dir)
        run: |
          BASE="tools/odds-scanner/predictions/WNBA/Pre-Game"
          # CRITICAL: strip repo-tracked stale data files so the shell deploy uploads ONLY
          # index.html and can never clobber the live latest.json / release payloads.
          rm -rf "$BASE/Edge" "$BASE/PMF-Distributions"
          mkdir -p "$BASE/Edge" "$BASE/PMF-Distributions"
          python - <<'PYEOF'
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location("gwp", "scripts/generate_web_pages.py")
          g = importlib.util.module_from_spec(spec); spec.loader.exec_module(g)
          base = pathlib.Path("tools/odds-scanner/predictions/WNBA/Pre-Game")
          (base / "Edge/index.html").write_text(g._EDGE_HTML)
          (base / "PMF-Distributions/index.html").write_text(g._PMF_HTML)
          assert "Betting edges abstained" in g._EDGE_HTML, "edge shell missing abstain markup"
          assert "renderValidationBanner" in g._PMF_HTML, "PMF shell missing validation banner"
          print(f"Edge shell {len(g._EDGE_HTML)} bytes; PMF shell {len(g._PMF_HTML)} bytes")
          PYEOF
          for d in Edge PMF-Distributions; do
            test "$(find "$BASE/$d" -type f | wc -l)" = "1" || { echo "[FATAL] extra files in $d"; find "$BASE/$d" -type f; exit 1; }
          done

      - name: Deploy shells only (html, preserve live JSON)
        run: python3 scripts/ftp_deploy.py --dirs Pre-Game/Edge Pre-Game/PMF-Distributions --no-wipe --include-html

      - name: Verify live shells
        run: |
          B="https://sportsodds.wizardofodds.com/tools/odds-scanner/predictions/WNBA/Pre-Game"
          curl -fsS "$B/Edge/?t=$(date +%s)" | grep -q "Betting edges abstained" \
            && echo "[verify] Edge abstention shell LIVE" || { echo "[FATAL] Edge shell missing"; exit 1; }
          curl -fsS "$B/PMF-Distributions/?t=$(date +%s)" | grep -q "renderValidationBanner" \
            && echo "[verify] PMF validation banner shell LIVE" || { echo "[FATAL] PMF shell missing"; exit 1; }
