name: Post-Game CLV Scoring

on:
  schedule:
    - cron: "0 6 * * *"   # 2 AM ET (UTC-4) -- after final WNBA games complete
  workflow_dispatch:
    inputs:
      game_date:
        description: "ISO date of games to score (YYYY-MM-DD). Defaults to yesterday."
        required: false
        default: ""

jobs:
  score-games:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Set game date (default yesterday)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "game_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            echo "game_date=$(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Download yesterday's predictions (cross-run via GitHub CLI)
        # actions/download-artifact@v4 only searches the CURRENT run's artifacts.
        # daily-delivery-* artifacts are produced by daily_pipeline.yml — a different run.
        # Use the same gh api zip-download pattern as daily_pipeline.yml lines 66-79.
        run: |
          GAME_DATE="${{ steps.date.outputs.game_date }}"
          mkdir -p deliveries/scored_day
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq "[.artifacts[] | select(.expired == false) | select(.name | startswith(\"daily-delivery-${GAME_DATE}-\"))] | sort_by(.created_at) | reverse | .[0].id" 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            echo "Downloading daily-delivery artifact id=$AID for $GAME_DATE"
            gh api "repos/${{ github.repository }}/actions/artifacts/${AID}/zip" > /tmp/delivery.zip
            unzip -o /tmp/delivery.zip -d deliveries/scored_day
            echo "Delivery artifact downloaded and extracted."
          else
            echo "[WARN] No daily-delivery artifact found for $GAME_DATE (no game that day or pipeline not yet run)"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Normalize predictions path
        # Artifacts are uploaded with workspace-relative paths (deliveries/next_game/...).
        # After unzip to deliveries/scored_day/, files land double-nested at
        # deliveries/scored_day/deliveries/next_game/full_pmfs_wide.parquet.
        # Flatten to the path the guard and scoring command expect.
        # Identical fix already applied in live_tracker.yml lines 129-146.
        run: |
          if [ ! -f "deliveries/scored_day/full_pmfs_wide.parquet" ]; then
            NESTED=$(find deliveries/scored_day -name "full_pmfs_wide.parquet" 2>/dev/null | head -1)
            if [ -n "$NESTED" ]; then
              cp "$NESTED" deliveries/scored_day/full_pmfs_wide.parquet
              echo "Normalized: $NESTED → deliveries/scored_day/full_pmfs_wide.parquet"
            else
              echo "[WARN] full_pmfs_wide.parquet not found anywhere under deliveries/scored_day/"
            fi
          else
            echo "full_pmfs_wide.parquet already at expected path."
          fi
          if [ ! -f "deliveries/scored_day/market_comparison.parquet" ]; then
            MC=$(find deliveries/scored_day -name "market_comparison.parquet" 2>/dev/null | head -1)
            if [ -n "$MC" ]; then
              cp "$MC" deliveries/scored_day/market_comparison.parquet
              echo "Normalized market_comparison: $MC → flat path"
            fi
          fi
        continue-on-error: true

      - name: Download prior closing-line artifacts (BDL snapshot fallback only)
        uses: actions/download-artifact@v4
        with:
          pattern: drift-audit-*
          merge-multiple: true
          path: artifacts/closing_lines_tmp
        continue-on-error: true

      # ── Correct ordering (P0): pull BDL -> pull FRESH closing -> canonicalize ->
      #    validate -> SELECT -> score. The closing-file selection must happen AFTER
      #    the fresh pull so scoring never uses a stale/pre-pull path.
      - name: Pull BDL actuals (canonical games/roster for ID resolution)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YEAR=$(echo "${{ steps.date.outputs.game_date }}" | cut -d'-' -f1)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl
          python scripts/build_canonical_tables.py \
            --raw-dir data/raw/bdl --out-dir data/processed

      - name: Pull FRESH Odds API closing lines and canonicalize
        # Historical Odds API snapshot at 11:30 PM UTC captures closing prices.
        # The puller fails-closed on empty output and canonicalizes event/player IDs
        # to the scorer contract (game_id/player_id/stat/market_prob_over_no_vig/line)
        # using the canonical games + roster tables built above.
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          GAME_DATE="${{ steps.date.outputs.game_date }}"
          if [ -n "$ODDS_API_KEY" ]; then
            python scripts/pull_odds_api_closing_lines.py \
              --game-date "$GAME_DATE" \
              --close-time "${GAME_DATE}T23:30:00Z" \
              --out-dir artifacts/closing_lines_tmp \
              --games-path data/processed/wnba_games.parquet \
              --roster-path data/processed/wnba_player_game_stats.parquet
          else
            echo "[WARN] No ODDS_API_KEY — closing-line edge/CLV will be skipped (fail-closed at scorer)."
          fi
        continue-on-error: true

      - name: Select closing-lines parquet (AFTER fresh pull)
        id: closing
        run: |
          GAME_DATE="${{ steps.date.outputs.game_date }}"
          # Prefer the freshly-pulled canonical Odds API file; then a BDL snapshot.
          CL_ODDS="artifacts/closing_lines_tmp/closing_lines_oddsapi_${GAME_DATE}.parquet"
          CL_BDL=$(find artifacts/closing_lines_tmp -name "closing_lines_${GAME_DATE}.parquet" 2>/dev/null | grep -v oddsapi | head -1)
          if [ -f "$CL_ODDS" ]; then
            echo "path=$CL_ODDS" >> $GITHUB_OUTPUT
            echo "Using freshly-pulled canonical Odds API closing lines: $CL_ODDS"
          elif [ -n "$CL_BDL" ]; then
            echo "path=$CL_BDL" >> $GITHUB_OUTPUT
            echo "Using BDL closing lines: $CL_BDL"
          else
            echo "path=artifacts/audits/closing_lines_${GAME_DATE}.parquet" >> $GITHUB_OUTPUT
            echo "No closing-line file available — scorer will skip closing-line edge (fail-closed)."
          fi

      - name: Guard — skip scoring on no-game dates
        id: game_guard
        run: |
          GAME_DATE="${{ steps.date.outputs.game_date }}"
          # If predictions artifact was not downloaded (no game that day), skip scoring
          if [ ! -f "deliveries/scored_day/full_pmfs_wide.parquet" ]; then
            echo "No predictions artifact for $GAME_DATE — no game day, skipping CLV scoring."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Score predictions vs. actuals (with market lines + closing lines)
        # This is the single authoritative CLV scoring path.
        # Computes open-line CLV (vs. morning market price) and true CLV
        # (vs. closing lines) for every scored bet.
        # continue-on-error REMOVED: failures must be visible, not silently skipped.
        if: steps.game_guard.outputs.skip != 'true'
        run: |
          python scripts/score_daily_predictions.py \
            --predictions deliveries/scored_day/full_pmfs_wide.parquet \
            --market-comparison deliveries/scored_day/market_comparison.parquet \
            --actuals data/processed/wnba_player_game_stats.parquet \
            --game-date ${{ steps.date.outputs.game_date }} \
            --closing-lines "${{ steps.closing.outputs.path }}" \
            --out-dir data/clv_tracking \
            --results-file data/clv_tracking/results.parquet

      - name: Generate CLV report
        run: |
          python scripts/generate_clv_report.py \
            --results data/clv_tracking/results.parquet \
            --lookback-days 30 \
            --out-dir artifacts/audits \
            --report-date ${{ steps.date.outputs.game_date }}
        continue-on-error: true

      - name: Market superiority gate (informational)
        # Asserts mean_true_clv > 0 and logloss_delta < 0 per stat using UCB95 bootstrap.
        # INFORMATIONAL until 300+ samples per stat accumulate (first full WNBA season).
        # Promote to --hard after first season by removing continue-on-error and passing --hard.
        # Reads from results.parquet -- must have model_bin_logloss + market_bin_logloss cols
        # (written by score_daily_predictions.py when --market-comparison is passed).
        run: |
          python scripts/verify_gates.py market \
            data/clv_tracking/results.parquet \
            --min-rows 100 \
            --informational
        continue-on-error: true

      - name: Upload CLV outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clv-report-${{ steps.date.outputs.game_date }}-${{ github.run_id }}
          path: |
            data/clv_tracking/
            artifacts/audits/clv_*.json
            artifacts/audits/clv_*.md
          retention-days: 90

      - name: Commit and push CLV results
        if: steps.game_guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/clv_tracking/results.parquet artifacts/audits/clv_*.json artifacts/audits/clv_*.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: CLV scoring results for ${{ steps.date.outputs.game_date }} [skip ci]"
            git push
          else
            echo "No CLV data changes to commit."
          fi
