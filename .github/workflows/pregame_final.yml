# Pre-Game Final Lock Projections -- blueprint S11.1
# Runs at 22:00 UTC (6pm ET) -- final lineup confirmation before tip.
# Applies config/player_overrides.json manual adjustments.
#
# Delivery URL: https://sportsodds.wizardofodds.com/tools/odds-scanner/
#               predictions/WNBA/Pre-Game-Edge/final/
name: Pre-Game Final Lock Projections

on:
  schedule:
    - cron: '30 21 * * *'  # 5:30 PM ET — catches early 7 PM ET tip-offs
    - cron: '0 22 * * *'   # 6:00 PM ET — standard primetime
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  pregame_final:
    runs-on: ubuntu-latest
    concurrency:
      group: pregame-final-${{ github.event.inputs.game_date || 'scheduled' }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
      pages: write
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download calibrators (cross-run via GitHub CLI)
        run: |
          mkdir -p artifacts/models/calibration
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=calibrators-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/calibrators.zip
            unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
            echo "Calibrators downloaded OK (id=$AID)"
          else
            echo "[WARN] calibrators-latest artifact not found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download stage4 model (cross-run via GitHub CLI)
        run: |
          mkdir -p artifacts/models/stage4_baseline
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=model-stage4-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/model_stage4.zip
            unzip -o /tmp/model_stage4.zip -d artifacts/models/stage4_baseline
            echo "Stage4 model downloaded OK (id=$AID)"
          else
            echo "[WARN] model-stage4-latest artifact not found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Resolve game date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "GAME_DATE=${{ github.event.inputs.game_date }}" >> $GITHUB_ENV
          else
            echo "GAME_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Download injury-update artifact (cross-run via GitHub CLI)
        run: |
          mkdir -p deliveries/tonight
          for ARTIFACT_NAME in "pregame-injury-update-${{ env.GAME_DATE }}" "pregame-initial-${{ env.GAME_DATE }}"; do
            AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=${ARTIFACT_NAME}" \
              --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
            if [ -n "$AID" ] && [ "$AID" != "null" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/pregame_artifact.zip
              unzip -o /tmp/pregame_artifact.zip -d .
              echo "Downloaded ${ARTIFACT_NAME} (id=$AID)"
              break
            fi
          done
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            echo "[WARN] No pregame PMF artifact found — will regenerate below"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Regenerate if no artifact
        run: |
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            SLATE="deliveries/tonight/slate_${GAME_DATE}.parquet"
            if [ -f "$SLATE" ]; then
              FEATURES_SRC="$SLATE"
              echo "Using slate: $FEATURES_SRC"
            elif [ -f "data/processed/wnba_player_game_features_wide.parquet" ]; then
              FEATURES_SRC="data/processed/wnba_player_game_features_wide.parquet"
              echo "Using historical features: $FEATURES_SRC"
            else
              echo "[WARN] No features or slate found and no cached PMFs — skipping regeneration"
              exit 0
            fi
            python scripts/predict_today.py \
              --features-wide "$FEATURES_SRC" \
              --game-date "$GAME_DATE" \
              --out-dir deliveries/tonight \
              --overrides config/player_overrides.json
          else
            echo "[OK] full_pmfs_wide.parquet already present — skipping regeneration"
          fi
        continue-on-error: true

      - name: Apply manual overrides from config/player_overrides.json (blueprint §6.1)
        run: |
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            echo "[WARN] No PMFs available — skipping overrides application"
            exit 0
          fi
          SLATE="deliveries/tonight/slate_${GAME_DATE}.parquet"
          if [ -f "$SLATE" ]; then
            FEATURES_SRC="$SLATE"
            echo "Using slate: $FEATURES_SRC"
          elif [ -f "data/processed/wnba_player_game_features_wide.parquet" ]; then
            FEATURES_SRC="data/processed/wnba_player_game_features_wide.parquet"
            echo "Using historical features: $FEATURES_SRC"
          else
            echo "[WARN] No features found — skipping overrides application"
            exit 0
          fi
          python scripts/predict_today.py \
            --features-wide "$FEATURES_SRC" \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --model-dir artifacts/models/stage4_baseline \
            --cal-dir artifacts/models/calibration \
            --overrides config/player_overrides.json
        continue-on-error: true

      - name: Fetch and cache injury report (BDL — final update)
        run: |
          mkdir -p data/injuries
          python - <<'PYEOF'
          import json, os, sys, requests
          from pathlib import Path

          api_key = os.environ.get("BDL_API_KEY", "")
          game_date = os.environ.get("GAME_DATE", "")
          out_path = Path(f"data/injuries/{game_date}.json")

          if not api_key:
              print("[WARN] BDL_API_KEY not set — keeping existing injury file")
              sys.exit(0)

          params = {"per_page": 100}
          headers = {"Authorization": api_key}
          try:
              resp = requests.get(
                  "https://api.balldontlie.io/wnba/v1/player_injuries",
                  params=params, headers=headers, timeout=20,
              )
              resp.raise_for_status()
              data = resp.json()
              injuries = data.get("data", data) if isinstance(data, dict) else data
              normalized = []
              for r in injuries:
                  player = r.get("player") or {}
                  pid = r.get("player_id") or player.get("id") or 0
                  name = r.get("player_name") or f"{player.get('first_name','')} {player.get('last_name','')}".strip()
                  normalized.append({
                      "player_id": int(pid), "player_name": name,
                      "status": str(r.get("status") or "available").lower(),
                      "return_date": r.get("return_date"), "comment": r.get("comment"),
                  })
              out_path.write_text(json.dumps(normalized, indent=2))
              print(f"Final injury update: {len(normalized)} records → {out_path}")
          except Exception as exc:
              print(f"[WARN] BDL injury fetch failed: {exc}")
          PYEOF
        continue-on-error: true

      - name: Apply confirmed lineups / late injury updates (UTM)
        run: |
          python scripts/apply_injury_updates.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --injuries-json "data/injuries/${GAME_DATE}.json"
        continue-on-error: true

      - name: Pull final Odds API props + deep links
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/processed
        continue-on-error: true

      - name: Validate data pipeline integrity
        run: |
          source .venv/bin/activate 2>/dev/null || true
          python3 - << 'PYEOF'
          import pandas as pd, sys, json
          from pathlib import Path
          from datetime import datetime, timezone

          all_ok = True

          proj_path = Path("deliveries/tonight/full_pmfs_wide.parquet")
          props_path = Path("data/processed/wnba_player_props.parquet")
          if proj_path.exists() and props_path.exists():
              proj = pd.read_parquet(proj_path)
              props = pd.read_parquet(props_path)
              proj_ids = set(proj["game_id"].dropna().unique()) if "game_id" in proj.columns else set()
              props_ids = set(props["game_id"].dropna().unique()) if "game_id" in props.columns else set()
              shared = proj_ids & props_ids
              if not shared and proj_ids and props_ids:
                  print(f"WARN: game_id mismatch: proj={proj_ids} market={props_ids} — edges will be empty", flush=True)
              else:
                  print(f"OK: game_ids shared={shared}", flush=True)
          else:
              print("INFO: parquet files not both present yet — skipping game_id check", flush=True)

          meta_path = Path("artifacts/models/calibration/calibration_metadata.json")
          if meta_path.exists():
              meta = json.loads(meta_path.read_text())
              fitted_at = datetime.fromisoformat(meta["fitted_at"].replace("Z", "+00:00"))
              age_days = (datetime.now(timezone.utc) - fitted_at).days
              if age_days > 14:
                  print(f"WARN: calibrators are {age_days} days old — consider triggering weekly_calibration", flush=True)
              else:
                  print(f"OK: calibrators age {age_days} days", flush=True)
          else:
              print("INFO: calibration_metadata.json not found — calibrators may not be fitted", flush=True)

          if proj_path.exists():
              proj = pd.read_parquet(proj_path)
              if len(proj) < 10:
                  print(f"FAIL: only {len(proj)} projection rows — pipeline likely failed", file=sys.stderr, flush=True)
                  sys.exit(1)
              print(f"OK: {len(proj)} projection rows", flush=True)

          print("Pipeline integrity check complete.", flush=True)
          PYEOF
        continue-on-error: true

      - name: Build final edge report
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/tonight \
            --game-date "$GAME_DATE" \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --cal-dir artifacts/models/calibration
        continue-on-error: true

      - name: Format final JSON output
        run: |
          python scripts/format_pregame_output.py \
            --game-date "$GAME_DATE" \
            --pipeline-run pregame_final \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game-Edge \
            --market-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --injuries data/injuries/${GAME_DATE}.json \
            --games data/processed/wnba_games.parquet

      - name: Copy to final/ subdirectory
        run: |
          mkdir -p tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/final
          SRC="tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/${GAME_DATE}_final.json"
          if [ -f "$SRC" ]; then
            cp "$SRC" tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/final/latest.json
            cp "$SRC" tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/final/${GAME_DATE}.json
            # Also update the root latest.json to the final version
            cp "$SRC" tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/latest.json
            echo "Copied final predictions for ${GAME_DATE}"
          else
            echo "[WARN] No final predictions file for ${GAME_DATE} — skipping copy"
          fi
        continue-on-error: true

      - name: Gate — skip publish if no edge data
        id: data-gate
        run: |
          EDGE_FILE="deliveries/tonight/publishable_edges.parquet"
          if [ ! -f "$EDGE_FILE" ]; then
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "[gate] No publishable_edges.parquet — skipping publish to preserve existing pages"
          else
            N=$(python3 -c "import pandas as pd; print(len(pd.read_parquet('$EDGE_FILE')))" 2>/dev/null || echo "0")
            if [ "$N" -le "0" ]; then
              echo "has_data=false" >> $GITHUB_OUTPUT
              echo "[gate] 0 edges — skipping publish"
            else
              echo "has_data=true" >> $GITHUB_OUTPUT
              echo "[gate] $N edges — proceeding"
            fi
          fi

      - name: Generate Edge Board + PMF Dashboard web pages
        run: |
          # Determine paths for projections parquet (prefer date-stamped, fall back to generic)
          PROJ_FILE="deliveries/tonight/player_projections_${GAME_DATE}.parquet"
          if [ ! -f "$PROJ_FILE" ]; then
            PROJ_FILE=$(ls deliveries/tonight/player_projections_*.parquet 2>/dev/null | head -1 || echo "")
          fi
          EDGE_FILE="deliveries/tonight/publishable_edges.parquet"

          python scripts/generate_web_pages.py \
            --game-date "$GAME_DATE" \
            ${PROJ_FILE:+--projections "$PROJ_FILE"} \
            ${EDGE_FILE:+--edges "$EDGE_FILE"} \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game \
            --live-dir tools/odds-scanner/predictions/WNBA/Inplay/Edges \
            --skip-live-html \
            --json-only
          echo "Web pages generated for ${GAME_DATE}"
        continue-on-error: true

      - name: Generate Distributions + Pricer pages
        run: |
          python scripts/generate_distributions_page.py \
            --game-date "$GAME_DATE" \
            --base-dir tools/odds-scanner/predictions/WNBA \
            --json-only
          python scripts/generate_pricer_page.py \
            --game-date "$GAME_DATE" \
            --base-dir tools/odds-scanner/predictions/WNBA
          echo "Distributions + Pricer pages generated for ${GAME_DATE}"
        continue-on-error: true

      - name: Stage all outputs for single gh-pages deploy
        if: steps.data-gate.outputs.has_data == 'true'
        run: |
          # Consolidate every output directory into _site so we make exactly
          # one push to gh-pages — eliminates all push race conditions.
          DIRS=(
            "tools/odds-scanner/predictions/WNBA/Pre-Game-Edge"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/Edge"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions"
            "tools/odds-scanner/predictions/WNBA/Pre-Game/Pricer"
            "tools/odds-scanner/predictions/WNBA/In-Play/Pricer"
          )
          for DIR in "${DIRS[@]}"; do
            if [ -d "$DIR" ]; then
              mkdir -p "_site/${DIR}"
              cp -r "${DIR}/." "_site/${DIR}/"
            fi
          done
          [ -d "tools/odds-scanner" ] && cp -r tools/odds-scanner/. _site/tools/odds-scanner/ || true
          echo "Staged files: $(find _site -type f | wc -l)"

      - name: Deploy all pages to gh-pages (single push — no race condition)
        if: steps.data-gate.outputs.has_data == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true

      - name: Deploy WNBA pages to sportsodds.wizardofodds.com via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/ftp_deploy.py
        continue-on-error: true

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: pregame-final-${{ env.GAME_DATE }}
          path: |
            deliveries/tonight/
            tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/
            tools/odds-scanner/predictions/WNBA/Pre-Game/Edge/
            tools/odds-scanner/predictions/WNBA/Pre-Game/PMF-Distributions/
            tools/odds-scanner/predictions/WNBA/Pre-Game/Distributions/
            tools/odds-scanner/predictions/WNBA/Pre-Game/Pricer/
            tools/odds-scanner/predictions/WNBA/In-Play/Pricer/
          retention-days: 30
