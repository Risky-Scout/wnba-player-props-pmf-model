name: Daily WNBA PMF Pipeline

on:
  schedule:
    - cron: "0 13 * * *"   # 9 AM ET (UTC-4 during summer)
  workflow_dispatch:
    inputs:
      game_date:
        description: "ISO date to predict for (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""
      skip_train:
        description: "Skip model retrain (faster if models trained recently)"
        required: false
        default: "false"

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download latest calibrators
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: calibrators-latest
          path: artifacts/models/calibration

      - name: Set game date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "game_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            echo "game_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Determine skip-train flag
        id: skip_train
        run: |
          if [ "${{ github.event.inputs.skip_train }}" = "true" ]; then
            echo "flag=--skip-train" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi

      - name: Pull BDL history (current season)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl

      - name: Build canonical tables
        run: |
          python scripts/build_canonical_tables.py \
            --raw-dir data/raw/bdl \
            --out-dir data/processed \
            --audit-out artifacts/audits/canonical_schema_audit.json

      - name: Build features
        run: |
          python scripts/build_features.py \
            --canonical-dir data/processed \
            --out-dir data/processed \
            --audit-out artifacts/audits/feature_audit.json

      - name: Train baseline PMFs (Stage 4)
        if: github.event.inputs.skip_train != 'true'
        run: |
          python scripts/train_baseline_pmfs.py \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --features-long data/processed/wnba_player_game_features_long.parquet \
            --manifest data/processed/feature_schema_manifest.json \
            --config config/model/stage4_baseline.yaml \
            --model-dir artifacts/models/stage4_baseline \
            --out-dir data/model_outputs/stage4_baseline \
            --audit-out artifacts/audits/stage4_training_audit.json

      - name: Predict today (HGB + calibration)
        run: |
          python scripts/predict_today.py \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --model-dir artifacts/models/stage4_baseline \
            --config config/model/stage4_baseline.yaml \
            --cal-dir artifacts/models/calibration \
            --game-date ${{ steps.date.outputs.game_date }} \
            --out-dir deliveries/today

      - name: Build edge report (Shin no-vig)
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/today/full_pmfs_wide.parquet \
            --raw-props data/processed/player_props.parquet \
            --out-dir deliveries/today \
            --edge-threshold 0.04 \
            --game-date ${{ steps.date.outputs.game_date }}
        continue-on-error: true   # no props today → edge report is empty but not fatal

      - name: Export betting sheets
        run: |
          python scripts/export_betting_sheet.py \
            --edges deliveries/today/publishable_edges.parquet \
            --out-dir deliveries/today \
            --game-date ${{ steps.date.outputs.game_date }}
        continue-on-error: true

      - name: Upload daily deliveries
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-delivery-${{ steps.date.outputs.game_date }}-${{ github.run_id }}
          path: |
            deliveries/today/
            artifacts/audits/stage4_training_audit.json
          retention-days: 14
