name: Daily WNBA PMF Pipeline

on:
  schedule:
    # Morning run: 6 AM ET (10:00 UTC) -- trains models, builds slate for TODAY
    # Moved to 6 AM to guarantee edges are published ≥12h before any WNBA tip-off (earliest ~7 PM ET).
    # pregame_initial.yml fires 30 min after this, publishing Edge Board by ~6:30 AM ET.
    - cron: "0 10 * * *"
    # Mid-morning run: 10 AM ET (14:00 UTC) -- re-pulls props after books post WNBA lines
    # Bookmakers typically post WNBA player props by 2 PM ET; this run captures early movers.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Target game date to predict FOR (YYYY-MM-DD). Defaults to tomorrow."
        required: false
        default: ""
      skip_train:
        description: "Skip model retrain (use cached models)"
        required: false
        default: "false"

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download tuned hyperparams artifact (if available)
        run: |
          mkdir -p artifacts/hyperparams
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=5&name=hyperparams-latest" \
            --jq '[.artifacts[] | select(.expired==false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/hp.zip
            unzip -o /tmp/hp.zip -d artifacts/hyperparams/
            echo "Downloaded hyperparams-latest (id=$AID)"
          else
            echo "[INFO] No hyperparams-latest artifact found — using config defaults"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download calibrators (cross-run via GitHub CLI)
        # actions/download-artifact@v4 only finds artifacts from the current run.
        # Use the GitHub API to find the latest calibrators-latest artifact across all runs.
        # JSON bias correction files are saved BEFORE the artifact unzip so the
        # repo-committed versions can be restored afterward (artifact .pkl files are
        # always used; JSON files in the repo take precedence when they differ).
        run: |
          mkdir -p artifacts/models/calibration
          # Save repo-committed JSON overrides before artifact download may clobber them
          for f in bias_corrections.json bias_corrections_by_role.json; do
            if [ -f "artifacts/models/calibration/$f" ]; then
              cp "artifacts/models/calibration/$f" "/tmp/repo_${f}"
              echo "Saved repo version of $f"
            fi
          done
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=calibrators-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            echo "Downloading calibrators-latest artifact id=$AID"
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/calibrators.zip
            unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
            echo "Calibrators downloaded OK"
          else
            echo "[WARN] No calibrators-latest artifact found — pipeline will run without calibrators"
          fi
          # Restore repo-committed JSON files — they take precedence over artifact versions.
          # This lets bias corrections be updated via git commit without a full calibration cycle.
          # The .pkl isotonic calibrators still come from the artifact (require OOF data to retrain).
          for f in bias_corrections.json bias_corrections_by_role.json; do
            if [ -f "/tmp/repo_${f}" ]; then
              cp "/tmp/repo_${f}" "artifacts/models/calibration/$f"
              echo "Restored repo override for $f"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Set game date (today or next game date)
        id: date
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            # Manual override — use exactly what was passed
            echo "target_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            # Auto-advance: if no WNBA games today, target tomorrow.
            # On off days the pipeline exits cleanly but leaves pages empty.
            # This keeps pages populated with the next slate's data.
            python3 - <<'PYEOF'
          import sys, os, json
          from datetime import date, timedelta
          try:
              import urllib.request
              today = date.today()
              tomorrow = today + timedelta(days=1)
              def has_games(d):
                  try:
                      api_key = os.environ.get("BDL_API_KEY", "")
                      url = f"https://api.balldontlie.io/wnba/v1/games?dates[]={d.isoformat()}&per_page=5"
                      req = urllib.request.Request(url, headers={"Authorization": api_key})
                      with urllib.request.urlopen(req, timeout=8) as r:
                          data = json.loads(r.read())
                          return len(data.get("data", [])) > 0
                  except Exception as e:
                      print(f"[date] BDL check failed: {e} -- defaulting to today", flush=True)
                      return True
              target = today if has_games(today) else tomorrow
              print(f"[date] target_date={target} (today={today}, tomorrow={tomorrow})", flush=True)
          except Exception as e:
              print(f"[date] Date logic failed: {e} -- falling back to today", flush=True)
              target = date.today()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"target_date={target.isoformat()}\n")
          PYEOF
          fi
          echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Pull BDL history (full history 2022–current for rich training data)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season 2022 --end-season $YEAR \
            --out-dir data/raw/bdl

      - name: Build canonical tables
        run: python scripts/build_canonical_tables.py --raw-dir data/raw/bdl --out-dir data/processed

      - name: Build features
        run: python scripts/build_features.py --data-dir data/processed

      - name: Assert feature table column count (P5.3)
        # Fails fast if feature build regressed (fewer columns than expected).
        # Threshold is 290 -- accommodates minor schema changes while catching major regressions.
        run: |
          python - <<'EOF'
          import pandas as pd, sys
          w = pd.read_parquet("data/processed/wnba_player_game_features_wide.parquet")
          n = len(w.columns)
          threshold = 290
          print(f"Feature table: {w.shape[0]:,} rows x {n} columns (threshold: {threshold})")
          if n < threshold:
              print(f"[FAIL] Feature column count {n} < {threshold} -- feature build regressed!", file=sys.stderr)
              sys.exit(1)
          print("[PASS] Feature column count OK")
          EOF

      - name: Download stage4 model (skip_train fallback via GitHub CLI)
        # When skip_train=true, training is skipped so we must download the latest
        # model artifact to ensure predict_today.py can find the model directory.
        if: github.event.inputs.skip_train == 'true'
        run: |
          mkdir -p artifacts/models/stage4_baseline
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=model-stage4-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/model_stage4.zip
            unzip -o /tmp/model_stage4.zip -d artifacts/models/stage4_baseline
            echo "Stage4 model downloaded OK (id=$AID)"
          else
            echo "[WARN] model-stage4-latest artifact not found — training will be required"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Train baseline PMFs (Stage 4)
        if: github.event.inputs.skip_train != 'true'
        run: |
          python scripts/train_baseline_pmfs.py \
            --time-decay-xi 0.003

      - name: Build game totals model (daily retrain)
        if: github.event.inputs.skip_train != 'true'
        run: |
          python scripts/build_game_totals.py \
            --games data/processed/wnba_games.parquet \
            --out-dir artifacts/models/game_totals \
            --time-decay-xi 0.002
        continue-on-error: true

      - name: Build next-game slate (D+1)
        run: |
          python scripts/build_next_game_slate.py \
            --game-date ${{ steps.date.outputs.target_date }} \
            --games-path data/processed/wnba_games.parquet \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --out-dir deliveries/next_game
        continue-on-error: true

      - name: Compute daily drift correction from yesterday's results
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import pandas as pd
          from pathlib import Path
          from wnba_props_model.pipeline.daily_drift import (
              compute_daily_drift, load_bias_corrections, save_bias_corrections
          )

          yesterday_preds_path = Path("deliveries/archive/yesterday_pmfs.parquet")
          actuals_path = Path("data/processed/wnba_player_game_stats.parquet")
          bias_path = Path("artifacts/models/calibration/bias_corrections.json")

          if not yesterday_preds_path.exists():
              print("No yesterday PMF archive -- skipping daily drift")
              exit(0)
          if not actuals_path.exists():
              print("No actuals parquet -- skipping daily drift")
              exit(0)

          yesterday_pmfs = pd.read_parquet(yesterday_preds_path)
          actuals_df = pd.read_parquet(actuals_path)

          from datetime import date, timedelta
          yesterday_date = (date.today() - timedelta(days=1)).isoformat()
          date_col = next((c for c in ["game_date", "date"] if c in actuals_df.columns), None)
          if date_col:
              actuals_df = actuals_df[actuals_df[date_col].astype(str).str[:10] == yesterday_date]

          if actuals_df.empty:
              print(f"No actuals found for {yesterday_date} -- skipping daily drift")
              exit(0)

          stat_cols = [c for c in ["pts", "reb", "ast", "fg3m", "stl", "blk", "turnover"]
                       if c in actuals_df.columns]
          id_col = "player_id" if "player_id" in actuals_df.columns else "bdl_player_id"
          actuals_long = actuals_df.melt(
              id_vars=[id_col], value_vars=stat_cols,
              var_name="stat", value_name="actual_value"
          ).rename(columns={id_col: "player_id"}).dropna(subset=["actual_value"])

          # Derive combo actuals from base actuals for drift tracking
          combo_map = {
              "pts_reb": ["pts", "reb"],
              "pts_ast": ["pts", "ast"],
              "reb_ast": ["reb", "ast"],
              "pts_reb_ast": ["pts", "reb", "ast"],
              "stocks": ["stl", "blk"],
          }
          combo_rows = []
          for combo_stat, components in combo_map.items():
              if not all(c in actuals_df.columns for c in components):
                  continue
              combo_df = actuals_df[[id_col] + components].copy()
              combo_df = combo_df.rename(columns={id_col: "player_id"})
              combo_df["actual_value"] = combo_df[components].sum(axis=1)
              combo_df["stat"] = combo_stat
              combo_rows.append(combo_df[["player_id", "stat", "actual_value"]])
          if combo_rows:
              actuals_long = pd.concat([actuals_long] + combo_rows, ignore_index=True)

          current = load_bias_corrections(bias_path)
          updated = compute_daily_drift(yesterday_pmfs, actuals_long, current)
          save_bias_corrections(updated, bias_path)
          print("Daily drift applied:", {k: v for k, v in updated.items() if not k.startswith("_")})
          PYEOF

      - name: Predict D+1 projections (HGB + calibration)
        run: |
          # Use the D+1 slate if it was built; fall back to full feature table with date filter
          SLATE="deliveries/next_game/slate_${{ steps.date.outputs.target_date }}.parquet"
          if [ -f "$SLATE" ]; then
            FEATURES_SRC="$SLATE"
          else
            FEATURES_SRC="data/processed/wnba_player_game_features_wide.parquet"
          fi
          python scripts/predict_today.py \
            --features-wide "$FEATURES_SRC" \
            --game-date ${{ steps.date.outputs.target_date }} \
            --out-dir deliveries/next_game

      - name: Predict game totals (D+1)
        run: |
          python scripts/predict_game_totals.py \
            --games data/processed/wnba_games.parquet \
            --model-dir artifacts/models/game_totals \
            --game-date ${{ steps.date.outputs.target_date }} \
            --out-dir deliveries/next_game
        continue-on-error: true

      - name: Pull Odds API player props (preferred market data)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date ${{ steps.date.outputs.target_date }} \
            --out-dir data/processed \
            --region us
        continue-on-error: true

      - name: Compute empirical role bias corrections
        run: python scripts/compute_role_bias_corrections.py
        continue-on-error: true

      - name: Build edge report (Shin no-vig)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/next_game/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --out-dir deliveries/next_game \
            --game-date ${{ steps.date.outputs.target_date }} \
            --cal-dir artifacts/models/calibration
        continue-on-error: true

      - name: Track CLV (Closing Line Value)
        run: |
          python scripts/track_clv.py --date "${{ steps.date.outputs.target_date }}" \
            --predictions deliveries/next_game/pmf_edges.parquet \
            --output data/clv_tracking.parquet
        continue-on-error: true

      - name: CI Variance Gate — reject degenerate predictions
        id: variance-gate
        run: |
          python3 - <<'EOF'
          import pandas as pd, sys, os
          pmf_path = "deliveries/next_game/full_pmfs_wide.parquet"
          if not os.path.exists(pmf_path):
              print("[GATE] No PMF file found — no games today, skipping gate")
              sys.exit(0)
          pmf = pd.read_parquet(pmf_path)
          if pmf.empty:
              print("[GATE] Empty PMF file — no games today, skipping gate")
              sys.exit(0)
          pts = pmf[pmf["stat"] == "pts"] if "stat" in pmf.columns else pmf
          starters = pts[pts["role_bucket"].isin(["starter", "core"])] if "role_bucket" in pts.columns else pts
          if len(starters) == 0:
              print("[GATE PASS] No starter rows — nothing to validate")
              sys.exit(0)
          max_pts = starters["pmf_mean"].max()
          mean_pts = starters["pmf_mean"].mean()
          print(f"[GATE] starter pts: mean={mean_pts:.2f}, max={max_pts:.2f}, n={len(starters)}")
          if mean_pts < 8.0:
              print(f"[GATE FAIL] starter pts_mean={mean_pts:.2f} < 8.0 (calibration collapse)")
              sys.exit(1)
          if max_pts < 12.0:
              print(f"[GATE FAIL] max starter pts={max_pts:.2f} < 12.0 (under-prediction)")
              sys.exit(1)
          if mean_pts > 28.0:
              print(f"[GATE FAIL] starter pts_mean={mean_pts:.2f} > 28.0 (over-prediction)")
              sys.exit(1)
          print(f"[GATE PASS] starter pts mean={mean_pts:.2f}, max={max_pts:.2f}")
          EOF

      - name: Export betting sheets
        run: |
          python scripts/export_betting_sheet.py \
            --edges deliveries/next_game/publishable_edges.parquet \
            --out-dir deliveries/next_game \
            --game-date ${{ steps.date.outputs.target_date }}
        continue-on-error: true

      - name: Export HTML report
        run: |
          python scripts/export_html_report.py \
            --pmfs deliveries/next_game/full_pmfs_wide.parquet \
            --game-totals deliveries/next_game/game_totals_${{ steps.date.outputs.target_date }}.parquet \
            --edges deliveries/next_game/publishable_edges.parquet \
            --game-date ${{ steps.date.outputs.target_date }} \
            --out deliveries/next_game/report_${{ steps.date.outputs.target_date }}.html
        continue-on-error: true

      - name: Generate explanations for flagged players
        run: |
          mkdir -p artifacts/explanations
          python scripts/explain_projection.py main \
            --game-date ${{ steps.date.outputs.target_date }} \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --out artifacts/explanations/explanations_${{ steps.date.outputs.target_date }}.json
        continue-on-error: true

      - name: Snapshot closing-line props (for yesterday's games)
        # Prefers The Odds API historical endpoint (true closing lines).
        # Falls back to BDL morning snapshot if ODDS_API_KEY not available.
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YESTERDAY="${{ steps.date.outputs.yesterday }}"
          # Try Odds API first (true closing lines via historical endpoint)
          if [ -n "$ODDS_API_KEY" ]; then
            python scripts/pull_odds_api_closing_lines.py \
              --game-date "$YESTERDAY" \
              --out-dir artifacts/audits
          fi
          # Also pull BDL morning lines as secondary reference
          python scripts/pull_closing_lines.py \
            --game-date "$YESTERDAY" \
            --out-dir artifacts/audits \
            --api-key "$BDL_API_KEY"
        continue-on-error: true

      - name: Score yesterday's outcomes
        # Fetches BDL box scores for yesterday and scores the edges published
        # during that day's pipeline run against actual results.
        # Appends to data/outcome_tracking.parquet for CLV / P&L reporting.
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          python scripts/score_outcomes.py \
            --game-date "${{ steps.date.outputs.yesterday }}" \
            --edges-path deliveries/archive/yesterday_pmfs.parquet \
            --output-path data/outcome_tracking.parquet
        continue-on-error: true

      - name: Download CLV tracking data (for drift check)
        # post_game_scoring.yml writes drift_window.parquet into data/clv_tracking/
        # and uploads it as clv-report-{date}-{run_id}. Without downloading this
        # artifact, the drift check always sees "no_data" and is a no-op.
        uses: actions/download-artifact@v4
        with:
          pattern: clv-report-*
          merge-multiple: true
          path: data/clv_tracking/
        continue-on-error: true

      - name: Determine calibration staleness threshold
        id: staleness
        run: |
          MONTH=$(date +%m)
          if [ "$MONTH" -ge 9 ]; then
            echo "threshold=3" >> $GITHUB_OUTPUT
            echo "Season phase: playoffs (threshold=3 days)"
          else
            echo "threshold=7" >> $GITHUB_OUTPUT
            echo "Season phase: regular season (threshold=7 days)"
          fi

      - name: Check calibration staleness and drift
        # Checks two failure modes:
        # 1. STALENESS: calibrators older than threshold days → force refit regardless of ECE.
        # 2. DRIFT: ECE>0.12 on last 100 scored predictions → force refit.
        # Both exit 1 to trigger the auto-refit steps below.
        id: drift-check
        continue-on-error: true
        run: |
          STALE_THRESHOLD="${{ steps.staleness.outputs.threshold }}"
          # Staleness check: force refit if calibrators have not been updated in threshold days
          python3 - <<PYEOF
          import json, sys, datetime, pathlib
          meta = pathlib.Path('artifacts/models/calibration/calibration_metadata.json')
          threshold = int('${STALE_THRESHOLD}')
          if meta.exists():
              d = json.loads(meta.read_text())
              fitted_at = d.get('fitted_at', '')
              if fitted_at:
                  age = (datetime.datetime.now(datetime.timezone.utc) - datetime.datetime.fromisoformat(fitted_at)).days
                  if age > threshold:
                      print(f'[STALE] Calibrators are {age} days old (>{threshold}) — forcing refit.')
                      sys.exit(1)
                  else:
                      print(f'[OK] Calibrators are {age} days old (<={threshold}).')
          PYEOF
          # Drift check: ECE threshold gate
          python scripts/check_calibration_drift.py \
            --scored-predictions data/clv_tracking/drift_window.parquet \
            --thresholds-soft-ece 0.06 \
            --thresholds-hard-ece 0.12 \
            --out artifacts/audits/drift_check_${{ steps.date.outputs.today }}.json

      - name: Download OOF PMFs for drift auto-refit
        # Only runs when drift-check triggers hard-refit. Uses GitHub CLI for cross-run download.
        if: steps.drift-check.outcome == 'failure'
        run: |
          mkdir -p data/oof
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=oof-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/oof.zip
            unzip -o /tmp/oof.zip -d data/oof
            echo "OOF artifact downloaded OK (id=$AID)"
          else
            echo "[WARN] oof-latest artifact not found — auto-refit skipped"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Auto-refit calibrators on hard drift
        # Only triggered when drift-check exits 1 (hard drift detected).
        if: steps.drift-check.outcome == 'failure'
        run: |
          echo "[AUTO-RECAL] Hard drift detected -- refitting calibrators from OOF data"
          python scripts/fit_calibrators.py \
            --oof-pmfs data/oof/oof_player_stat_pmfs.parquet \
            --out-dir artifacts/models/calibration
          echo "[AUTO-RECAL] Calibrators refitted. Caching for next run."

      - name: Cache auto-refit calibrators
        if: steps.drift-check.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: artifacts/models/calibration/
          key: calibrators-latest-${{ github.run_id }}

      - name: Cache stage4 model (for pregame workflows)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: artifacts/models/stage4_baseline/
          key: model-stage4-latest-${{ github.run_id }}

      - name: Generate model artifact manifest (Gap 1 — artifact provenance)
        # Emit artifact_manifest_model.json into the model directory so that
        # pregame_initial.yml can validate the artifact's provenance before use.
        # MUST only run after training and validation succeed — no if: always().
        # If any required field cannot be computed, exit nonzero; do NOT upload
        # a manifest with blank or "unknown" fields.
        run: |
          python3 - <<'PYEOF'
          import hashlib, json, os, subprocess, sys
          from datetime import datetime, timezone
          from pathlib import Path

          run_id = os.environ.get("GITHUB_RUN_ID", "")
          workflow_name = os.environ.get("GITHUB_WORKFLOW", "Daily WNBA PMF Pipeline")

          # git commit — FATAL if unreachable
          try:
              git_commit = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
              if not git_commit:
                  raise ValueError("git rev-parse HEAD returned empty string")
          except Exception as exc:
              print(f"[FATAL] Cannot compute git HEAD commit: {exc}", file=sys.stderr)
              sys.exit(1)

          model_dir = Path("artifacts/models/stage4_baseline")
          model_dir.mkdir(parents=True, exist_ok=True)

          # Feature manifest hash — FATAL if file missing
          feat_manifest_path = Path("data/processed/feature_schema_manifest.json")
          if not feat_manifest_path.exists():
              print(f"[FATAL] Feature schema manifest not found at {feat_manifest_path}. "
                    "Cannot produce a valid model artifact manifest without it.", file=sys.stderr)
              sys.exit(1)
          feature_manifest_hash = hashlib.sha256(feat_manifest_path.read_bytes()).hexdigest()[:16]

          # Config hash — FATAL if file missing
          config_path = Path("config/model/stage4_baseline.yaml")
          if not config_path.exists():
              print(f"[FATAL] Model config not found at {config_path}. "
                    "Cannot produce a valid model artifact manifest without it.", file=sys.stderr)
              sys.exit(1)
          config_hash = hashlib.sha256(config_path.read_bytes()).hexdigest()[:16]

          # Training cutoff: latest game date in feature table — FATAL if unavailable
          import pandas as pd
          feat_path = Path("data/processed/wnba_player_game_features_wide.parquet")
          if not feat_path.exists():
              print(f"[FATAL] Feature table not found at {feat_path}. "
                    "Cannot compute model_training_cutoff.", file=sys.stderr)
              sys.exit(1)
          df = pd.read_parquet(feat_path)
          date_col = next((c for c in ["game_date", "date"] if c in df.columns), None)
          if not date_col:
              print(f"[FATAL] No date column in feature table. "
                    "Cannot compute model_training_cutoff.", file=sys.stderr)
              sys.exit(1)
          latest = pd.to_datetime(df[date_col]).max()
          model_training_cutoff = latest.strftime("%Y-%m-%dT00:00:00Z")

          manifest = {
              "artifact_type": "model",
              "artifact_schema_version": "1",
              "source_workflow": workflow_name,
              "source_run_id": run_id,
              "source_commit": git_commit,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "model_training_cutoff": model_training_cutoff,
              "feature_manifest_hash": feature_manifest_hash,
              "config_hash": config_hash,
          }
          out_path = model_dir / "artifact_manifest_model.json"
          out_path.write_text(json.dumps(manifest, indent=2))
          print(f"Model artifact manifest written: {manifest}")
          PYEOF

      - name: Upload stage4 model (stable artifact for pregame workflows)
        # Must only run after training, validation, and manifest generation succeed.
        # No conditional guard — GitHub Actions default: skip on any prior failure.
        uses: actions/upload-artifact@v4
        with:
          name: model-stage4-latest
          path: artifacts/models/stage4_baseline/
          retention-days: 90
          overwrite: true

      - name: Re-upload calibrators artifact (keeps it alive daily)
        # Ensures calibrators-latest artifact is always fresh even if weekly_calibration
        # hasn't run recently. Downloads from cache then re-uploads.
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: calibrators-latest
          path: artifacts/models/calibration/
          retention-days: 90
          overwrite: true

      - name: Upload daily delivery (primary artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-delivery-${{ steps.date.outputs.target_date }}-${{ github.run_id }}
          path: |
            deliveries/next_game/
            artifacts/explanations/explanations_${{ steps.date.outputs.target_date }}.json
            artifacts/models/game_totals/team_score_summary.json
          retention-days: 30

      - name: Upload betting sheets (Kalshi / Polymarket)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: betting-sheets-${{ steps.date.outputs.target_date }}-${{ github.run_id }}
          path: |
            deliveries/next_game/betting_sheet_${{ steps.date.outputs.target_date }}.csv
            deliveries/next_game/kalshi_sheet_${{ steps.date.outputs.target_date }}.csv
            deliveries/next_game/polymarket_sheet_${{ steps.date.outputs.target_date }}.csv
          retention-days: 30

      - name: Upload drift/closing-line audits
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-audit-${{ steps.date.outputs.today }}-${{ github.run_id }}
          path: |
            artifacts/audits/drift_check_${{ steps.date.outputs.today }}.json
            artifacts/audits/closing_lines_${{ steps.date.outputs.yesterday }}.parquet
          retention-days: 14

      - name: Bridge next_game → tonight for pregame_final compatibility
        # When target_date != today (off-day advance), daily_pipeline writes to
        # deliveries/next_game/ but pregame_final reads from deliveries/tonight/.
        # Copy outputs so the pregame-initial artifact chain works correctly.
        if: ${{ !cancelled() }}
        run: |
          TARGET="${{ steps.date.outputs.target_date }}"
          TODAY=$(date -u +%Y-%m-%d)
          if [ "$TARGET" != "$TODAY" ] && [ -d "deliveries/next_game" ]; then
            mkdir -p deliveries/tonight
            find deliveries/next_game -maxdepth 1 \( -name "*.parquet" -o -name "*.json" \) | while read f; do
              cp "$f" "deliveries/tonight/$(basename $f)" 2>/dev/null || true
            done
            echo "[bridge] Copied next_game → tonight for target_date=$TARGET"
            ls -la deliveries/tonight/ | head -20
          else
            echo "[bridge] target_date=$TARGET == today=$TODAY or next_game absent — no bridge needed"
          fi

      - name: Archive today's PMFs for daily drift (tomorrow)
        continue-on-error: true
        run: |
          mkdir -p deliveries/archive
          # Always prefer next_game/ (canonical output dir) first, then tonight/
          # as fallback (populated by the bridge step on off-days). Previously this
          # only searched tonight/, so on game days (target_date == today, no bridge)
          # the archive was always empty and daily drift was a no-op every game day.
          PARQUET_PATH=""
          # 1. next_game: prefer the full PMF wide table
          if [ -f "deliveries/next_game/full_pmfs_wide.parquet" ]; then
            PARQUET_PATH="deliveries/next_game/full_pmfs_wide.parquet"
          fi
          # 2. next_game: any non-edge parquet
          if [ -z "$PARQUET_PATH" ]; then
            PARQUET_PATH=$(find deliveries/next_game -name "*.parquet" 2>/dev/null | grep -v "publishable\|market_comp\|edge\|quantile" | head -1)
          fi
          # 3. tonight/ fallback (bridge populated on off-days)
          if [ -z "$PARQUET_PATH" ]; then
            PARQUET_PATH=$(find deliveries/tonight -name "*.parquet" 2>/dev/null | grep -v "publishable\|market_comp\|edge\|quantile" | head -1)
          fi
          if [ -f "$PARQUET_PATH" ]; then
            cp "$PARQUET_PATH" deliveries/archive/yesterday_pmfs.parquet
            echo "Archived PMFs: $PARQUET_PATH"
          else
            FALLBACK=$(find deliveries/next_game deliveries/tonight -name "publishable_edges.parquet" 2>/dev/null | head -1)
            if [ -f "$FALLBACK" ]; then
              cp "$FALLBACK" deliveries/archive/yesterday_pmfs.parquet
              echo "Archived publishable edges as PMF archive"
            else
              echo "[WARN] No parquet found to archive for drift"
            fi
          fi

      - name: Trigger pregame dashboard publish (explicit dispatch)
        # workflow_run events are unreliable for schedule-triggered parent workflows.
        # Explicitly dispatch pregame_initial after daily_pipeline runs so the
        # dashboard always reflects today's model output. Fires unless cancelled.
        if: ${{ !cancelled() }}
        run: |
          gh workflow run pregame_initial.yml \
            --ref ${{ github.ref_name }} \
            --field game_date=${{ steps.date.outputs.target_date }}
          echo "Dispatched pregame_initial for ${{ steps.date.outputs.target_date }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
