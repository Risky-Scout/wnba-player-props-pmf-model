name: Daily WNBA PMF Pipeline

on:
  schedule:
    # Run at 9 AM ET (13:00 UTC during summer, 14:00 UTC during winter)
    # Predicts for TOMORROW's games — one day before gameday per NoVig contract
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      game_date:
        description: "Target game date to predict FOR (YYYY-MM-DD). Defaults to tomorrow."
        required: false
        default: ""
      skip_train:
        description: "Skip model retrain (use cached models)"
        required: false
        default: "false"

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download latest calibrators
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: calibrators-latest
          path: artifacts/models/calibration

      - name: Set game date (tomorrow by default)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            # Manual override: predict for specified date
            echo "target_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            # Default: predict for tomorrow (D+1 per NoVig contract)
            echo "target_date=$(date -u -d 'tomorrow' +%Y-%m-%d 2>/dev/null || date -v+1d -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi
          # Record today for data ingestion
          echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Pull BDL history (current season)
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        run: |
          YEAR=$(date -u +%Y)
          python scripts/pull_bdl_history.py \
            --start-season $YEAR --end-season $YEAR \
            --out-dir data/raw/bdl

      - name: Build canonical tables
        run: python scripts/build_canonical_tables.py --raw-dir data/raw/bdl --out-dir data/processed

      - name: Build features
        run: python scripts/build_features.py --data-dir data/processed

      - name: Train baseline PMFs (Stage 4)
        if: github.event.inputs.skip_train != 'true'
        run: python scripts/train_baseline_pmfs.py

      - name: Build next-game slate (D+1)
        run: |
          python scripts/build_next_game_slate.py \
            --game-date ${{ steps.date.outputs.target_date }} \
            --games-path data/processed/wnba_games.parquet \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --out-dir deliveries/next_game
        continue-on-error: true

      - name: Predict D+1 projections (HGB + calibration)
        run: |
          python scripts/predict_today.py \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --game-date ${{ steps.date.outputs.target_date }} \
            --out-dir deliveries/next_game

      - name: Build edge report (Shin no-vig)
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/next_game/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/next_game \
            --game-date ${{ steps.date.outputs.target_date }}
        continue-on-error: true

      - name: Export NoVig betting sheets
        run: |
          python scripts/export_betting_sheet.py \
            --edges deliveries/next_game/publishable_edges.parquet \
            --out-dir deliveries/next_game \
            --game-date ${{ steps.date.outputs.target_date }}
        continue-on-error: true

      - name: Generate explanations for flagged players
        run: |
          python scripts/explain_projection.py \
            --game-date ${{ steps.date.outputs.target_date }} \
            --features-wide data/processed/wnba_player_game_features_wide.parquet \
            --out artifacts/explanations/explanations_${{ steps.date.outputs.target_date }}.json
        continue-on-error: true

      - name: Upload NoVig delivery (primary artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: novig-delivery-${{ steps.date.outputs.target_date }}-${{ github.run_id }}
          path: |
            deliveries/next_game/
            artifacts/explanations/explanations_${{ steps.date.outputs.target_date }}.json
          retention-days: 30

      - name: Upload betting sheets (NoVig / Kalshi / Polymarket)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: betting-sheets-${{ steps.date.outputs.target_date }}-${{ github.run_id }}
          path: |
            deliveries/next_game/betting_sheet_${{ steps.date.outputs.target_date }}.csv
            deliveries/next_game/kalshi_sheet_${{ steps.date.outputs.target_date }}.csv
            deliveries/next_game/polymarket_sheet_${{ steps.date.outputs.target_date }}.csv
          retention-days: 30
