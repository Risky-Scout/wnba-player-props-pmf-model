name: CI — Tests, Feature Variance Gate, CLV Backtest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Permanent actionlint gate — catches workflow YAML/expression syntax errors
  # on every push and PR. Regression proof: pregame_initial.yml was fixed in
  # hotfix/pregame-workflow-yaml (missing 10-space indentation on heredoc
  # content caused GitHub "Invalid workflow file" on line 269).
  # ---------------------------------------------------------------------------
  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.7
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint -version
      - name: Run actionlint
        run: actionlint -shellcheck= -pyflakes= .github/workflows/*.yml .github/workflows/*.yaml 2>/dev/null || actionlint -shellcheck= -pyflakes= .github/workflows/*.yml

  # ---------------------------------------------------------------------------
  # Unit + integration tests (existing 691 tests)
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short --ignore=tests/test_elite_projection_gate.py

  # ---------------------------------------------------------------------------
  # R5.2 — Feature variance gate (Blueprint R5)
  # Fails CI if any model feature has cross-player std < 0.05.
  # Requires wide features + manifest from a previous pipeline run.
  # ---------------------------------------------------------------------------
  feature_variance_gate:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Only run when processed features exist (skipped on fresh checkouts)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download latest model artifacts (for manifest + features)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: model-stage4-latest
          path: artifacts/models/stage4_baseline
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download processed features
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: processed-features-latest
          path: data/processed
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Feature variance gate
        run: |
          if [ ! -f "data/processed/feature_schema_manifest.json" ] || \
             [ ! -f "data/processed/wnba_player_game_features_wide.parquet" ]; then
            echo "Feature artifacts not available — skipping variance gate"
            echo "(Run daily_pipeline.yml to generate them)"
            exit 0
          fi
          python -m wnba_props_model.features.feature_contract audit-variance \
            --features-path data/processed/wnba_player_game_features_wide.parquet \
            --manifest-path data/processed/feature_schema_manifest.json \
            --min-std 0.05 \
            --fail-on-violation

  # ---------------------------------------------------------------------------
  # R6.3 — CLV backtest (Blueprint R6)
  # Checks whether historical model edges beat market close ≥ 75% of the time.
  # Only runs on pushes to main (requires historical delivery data).
  # ---------------------------------------------------------------------------
  clv_backtest:
    runs-on: ubuntu-latest
    needs: [feature_variance_gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download delivery data
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: daily-delivery-latest
          path: data/delivery
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CLV backtest
        run: |
          python scripts/backtest_clv.py \
            --comparisons-dir data/delivery/ \
            --out artifacts/audits/clv_backtest.json

      - name: Upload CLV backtest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clv-backtest-${{ github.run_id }}
          path: artifacts/audits/clv_backtest.json
          retention-days: 30
