# Pre-Game Injury Update Projections -- blueprint S11.1
# Runs at 18:00 UTC (2pm ET) -- post-injury reports, reacted projections.
# Overwrites latest.json with injury-adjusted values.
#
# Delivery URL: https://sportsodds.wizardofodds.com/tools/odds-scanner/
#               predictions/WNBA/Pre-Game-Edge/latest.json
name: Pre-Game Injury Update Projections

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC daily
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  pregame_injury_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      pages: write
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Resolve game date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "GAME_DATE=${{ github.event.inputs.game_date }}" >> $GITHUB_ENV
            echo "Explicit game_date: ${{ github.event.inputs.game_date }}"
          else
            # Smart date: look for a pregame-initial artifact for today or tomorrow.
            # This workflow runs at 18:00 UTC (2 PM ET); by then daily_pipeline has
            # already run and pregame_initial has produced its artifact.  If today
            # has no games the pipeline targets tomorrow, so we follow the same logic.
            TODAY=$(date -u +%Y-%m-%d)
            TOMORROW=$(date -u -d 'tomorrow' +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
            RESOLVED_DATE=""
            for CANDIDATE in "$TODAY" "$TOMORROW"; do
              AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=pregame-initial-${CANDIDATE}" \
                --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
              if [ -n "$AID" ] && [ "$AID" != "null" ]; then
                RESOLVED_DATE="$CANDIDATE"
                echo "Found pregame-initial artifact for ${CANDIDATE} (id=${AID})"
                break
              fi
            done
            if [ -z "$RESOLVED_DATE" ]; then
              RESOLVED_DATE="$TOMORROW"
              echo "No pregame-initial artifact found — defaulting to tomorrow: ${RESOLVED_DATE}"
            fi
            echo "GAME_DATE=${RESOLVED_DATE}" >> $GITHUB_ENV
            echo "Game date resolved to: ${RESOLVED_DATE}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download calibrators (cross-run via GitHub CLI)
        run: |
          mkdir -p artifacts/models/calibration
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=calibrators-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/calibrators.zip
            unzip -o /tmp/calibrators.zip -d artifacts/models/calibration
            echo "Calibrators downloaded OK (id=$AID)"
          else
            echo "[WARN] calibrators-latest artifact not found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download stage4 model (cross-run via GitHub CLI)
        run: |
          mkdir -p artifacts/models/stage4_baseline
          AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=model-stage4-latest" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
          if [ -n "$AID" ] && [ "$AID" != "null" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/model_stage4.zip
            unzip -o /tmp/model_stage4.zip -d artifacts/models/stage4_baseline
            echo "Stage4 model downloaded OK (id=$AID)"
          else
            echo "[WARN] model-stage4-latest artifact not found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Download latest pregame artifact (cross-run via GitHub CLI)
        run: |
          mkdir -p deliveries/tonight
          # Try pregame-initial first (always has valid PMF), then pregame-injury-update.
          # Only accept an artifact if it actually contains full_pmfs_wide.parquet.
          for ARTIFACT_NAME in "pregame-initial-${{ env.GAME_DATE }}" "pregame-injury-update-${{ env.GAME_DATE }}"; do
            AID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100&name=${ARTIFACT_NAME}" \
              --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].id' 2>/dev/null)
            if [ -n "$AID" ] && [ "$AID" != "null" ]; then
              gh api "repos/${{ github.repository }}/actions/artifacts/$AID/zip" > /tmp/pregame.zip
              # Unzip to repo root so deliveries/tonight/full_pmfs_wide.parquet lands correctly
              unzip -o /tmp/pregame.zip -d .
              if [ -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
                echo "Pre-game artifact downloaded with valid PMF: ${ARTIFACT_NAME} (id=$AID)"
                break
              else
                echo "[WARN] Artifact ${ARTIFACT_NAME} (id=$AID) has no PMF — trying next"
              fi
            fi
          done
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            echo "[WARN] full_pmfs_wide.parquet not found after all artifact attempts — will regenerate"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Regenerate PMF projections (if no artifact)
        run: |
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            SLATE="deliveries/tonight/slate_${GAME_DATE}.parquet"
            if [ -f "$SLATE" ]; then
              FEATURES_SRC="$SLATE"
              echo "Using slate: $FEATURES_SRC"
            else
              FEATURES_SRC="data/processed/wnba_player_game_features_wide.parquet"
              echo "Slate not found, falling back to historical features: $FEATURES_SRC"
            fi
            python scripts/predict_today.py \
              --features-wide "$FEATURES_SRC" \
              --game-date "$GAME_DATE" \
              --out-dir deliveries/tonight \
              --overrides config/player_overrides.json
          fi
        continue-on-error: true

      - name: Fetch and cache injury report (BDL)
        run: |
          mkdir -p data/injuries
          python - <<'PYEOF'
          import json, os, sys, requests
          from pathlib import Path

          api_key = os.environ.get("BDL_API_KEY", "")
          game_date = os.environ.get("GAME_DATE", "")
          out_path = Path(f"data/injuries/{game_date}.json")

          if not api_key:
              print("[WARN] BDL_API_KEY not set — writing empty injury file")
              out_path.write_text("[]")
              sys.exit(0)

          params = {"per_page": 100}
          headers = {"Authorization": api_key}
          try:
              resp = requests.get(
                  "https://api.balldontlie.io/wnba/v1/player_injuries",
                  params=params, headers=headers, timeout=20,
              )
              resp.raise_for_status()
              data = resp.json()
              injuries = data.get("data", data) if isinstance(data, dict) else data
              normalized = []
              for r in injuries:
                  player = r.get("player") or {}
                  pid = r.get("player_id") or player.get("id") or 0
                  name = r.get("player_name") or f"{player.get('first_name','')} {player.get('last_name','')}".strip()
                  normalized.append({
                      "player_id": int(pid), "player_name": name,
                      "status": str(r.get("status") or "available").lower(),
                      "return_date": r.get("return_date"), "comment": r.get("comment"),
                  })
              out_path.write_text(json.dumps(normalized, indent=2))
              print(f"Saved {len(normalized)} injury records → {out_path}")
          except Exception as exc:
              print(f"[WARN] BDL injury fetch failed: {exc} — writing empty file")
              out_path.write_text("[]")
          PYEOF
        continue-on-error: true

      - name: Apply injury updates (UTM redistribution)
        run: |
          python scripts/apply_injury_updates.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --injuries-json "data/injuries/${GAME_DATE}.json"
        continue-on-error: true

      - name: Pull fresh Odds API props
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/processed
        continue-on-error: true

      - name: Build edge report
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/tonight \
            --slate-manifest deliveries/tonight/slate_manifest.json \
            --game-date "$GAME_DATE" \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --policy config/recommendation_policy.yaml
        continue-on-error: true

      - name: Format injury-updated JSON output
        run: |
          python scripts/format_pregame_output.py \
            --game-date "$GAME_DATE" \
            --pipeline-run pregame_injury_update \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game-Edge \
            --market-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --injuries data/injuries/${GAME_DATE}.json \
            --games data/processed/wnba_games.parquet

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tools/odds-scanner/predictions/WNBA/Pre-Game-Edge
          publish_branch: gh-pages
          destination_dir: tools/odds-scanner/predictions/WNBA/Pre-Game-Edge
          keep_files: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pregame-injury-update-${{ env.GAME_DATE }}
          path: |
            deliveries/tonight/
            data/injuries/
            tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/
          retention-days: 7
