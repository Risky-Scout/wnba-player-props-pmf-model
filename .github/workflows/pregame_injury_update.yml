# Pre-Game Injury Update Projections -- blueprint S11.1
# Runs at 18:00 UTC (2pm ET) -- post-injury reports, reacted projections.
# Overwrites latest.json with injury-adjusted values.
#
# Delivery URL: https://sportsodds.wizardofodds.com/tools/odds-scanner/
#               predictions/WNBA/Pre-Game-Edge/latest.json
name: Pre-Game Injury Update Projections

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC daily
  workflow_dispatch:
    inputs:
      game_date:
        description: 'Target game date (YYYY-MM-DD, defaults to today)'
        required: false
        default: ''

jobs:
  pregame_injury_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      BDL_API_KEY:   ${{ secrets.BDL_API_KEY }}
      ODDS_API_KEY:  ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore calibrators from cache
        id: cal-cache
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: artifacts/models/calibration/
          key: calibrators-latest-${{ github.run_id }}
          restore-keys: calibrators-latest-

      - name: Download calibrators (fallback)
        if: steps.cal-cache.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: calibrators-latest
          path: artifacts/models/calibration/

      - name: Resolve game date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "GAME_DATE=${{ github.event.inputs.game_date }}" >> $GITHUB_ENV
          else
            echo "GAME_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Download latest pregame artifact
        uses: actions/download-artifact@v4
        with:
          name: pregame-initial-${{ env.GAME_DATE }}
          path: .
        continue-on-error: true

      - name: Regenerate PMF projections (if no artifact)
        run: |
          if [ ! -f "deliveries/tonight/full_pmfs_wide.parquet" ]; then
            python scripts/predict_today.py \
              --features-wide data/processed/wnba_player_game_features_wide.parquet \
              --game-date "$GAME_DATE" \
              --out-dir deliveries/tonight \
              --overrides config/player_overrides.json
          fi
        continue-on-error: true

      - name: Fetch and cache injury report (BDL)
        run: |
          mkdir -p data/injuries
          python - <<'PYEOF'
          import json, os, sys, requests
          from pathlib import Path

          api_key = os.environ.get("BDL_API_KEY", "")
          game_date = os.environ.get("GAME_DATE", "")
          out_path = Path(f"data/injuries/{game_date}.json")

          if not api_key:
              print("[WARN] BDL_API_KEY not set — writing empty injury file")
              out_path.write_text("[]")
              sys.exit(0)

          params = {"per_page": 100}
          headers = {"Authorization": api_key}
          try:
              resp = requests.get(
                  "https://api.balldontlie.io/wnba/v1/player_injuries",
                  params=params, headers=headers, timeout=20,
              )
              resp.raise_for_status()
              data = resp.json()
              injuries = data.get("data", data) if isinstance(data, dict) else data
              normalized = []
              for r in injuries:
                  player = r.get("player") or {}
                  pid = r.get("player_id") or player.get("id") or 0
                  name = r.get("player_name") or f"{player.get('first_name','')} {player.get('last_name','')}".strip()
                  normalized.append({
                      "player_id": int(pid), "player_name": name,
                      "status": str(r.get("status") or "available").lower(),
                      "return_date": r.get("return_date"), "comment": r.get("comment"),
                  })
              out_path.write_text(json.dumps(normalized, indent=2))
              print(f"Saved {len(normalized)} injury records → {out_path}")
          except Exception as exc:
              print(f"[WARN] BDL injury fetch failed: {exc} — writing empty file")
              out_path.write_text("[]")
          PYEOF
        continue-on-error: true

      - name: Apply injury updates (UTM redistribution)
        run: |
          python scripts/apply_injury_updates.py \
            --game-date "$GAME_DATE" \
            --out-dir deliveries/tonight \
            --injuries-json "data/injuries/${GAME_DATE}.json"
        continue-on-error: true

      - name: Pull fresh Odds API props
        run: |
          python scripts/pull_odds_api_props.py \
            --game-date "$GAME_DATE" \
            --out-dir data/processed
        continue-on-error: true

      - name: Build edge report
        run: |
          python scripts/build_edge_report.py \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --raw-props data/processed/wnba_player_props.parquet \
            --out-dir deliveries/tonight \
            --game-date "$GAME_DATE" \
            --odds-api-props data/processed/wnba_player_props_oddsapi_latest.parquet
        continue-on-error: true

      - name: Format injury-updated JSON output
        run: |
          python scripts/format_pregame_output.py \
            --game-date "$GAME_DATE" \
            --pipeline-run pregame_injury_update \
            --pmfs deliveries/tonight/full_pmfs_wide.parquet \
            --out-dir tools/odds-scanner/predictions/WNBA/Pre-Game-Edge \
            --market-props data/processed/wnba_player_props_oddsapi_latest.parquet \
            --injuries data/injuries/${GAME_DATE}.json \
            --games data/processed/wnba_games.parquet

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: tools/odds-scanner/predictions/WNBA/Pre-Game-Edge
          publish_branch: gh-pages
          destination_dir: tools/odds-scanner/predictions/WNBA/Pre-Game-Edge
          keep_files: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pregame-injury-update-${{ env.GAME_DATE }}
          path: |
            deliveries/tonight/
            data/injuries/
            tools/odds-scanner/predictions/WNBA/Pre-Game-Edge/
          retention-days: 7
