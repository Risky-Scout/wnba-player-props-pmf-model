name: Live In-Play Engine (Legacy)
# NOTE: This workflow is a LEGACY dev tool kept for reference only.
# The CANONICAL live engine is live_tracker.yml -> run_live_tracker.py + GammaPoissonLiveEngine.
# This workflow calls live_stream.py which is an argparse-based standalone script.
# Runs every 5 minutes during WNBA game windows (ET: 7pm-11pm = UTC 23:00-03:00)
# Covers Mon-Sun during the WNBA season (May-October)
on:
  schedule:
    # Every 5 minutes: 23:00-03:00 UTC  (7pm-11pm ET)
    - cron: "*/5 23 * * *"
    - cron: "*/5 0 * * *"
    - cron: "*/5 1 * * *"
    - cron: "*/5 2 * * *"
    - cron: "*/5 3 * * *"
  workflow_dispatch:
    inputs:
      game_id:
        description: "BDL game ID to stream (optional; auto-detects if blank)"
        required: false
      dry_run:
        description: "Dry-run mode (one snapshot then exit)"
        required: false
        default: "false"

jobs:
  live-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # Shorter than 10-min schedule gap to avoid overlap

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Download latest pre-game artifacts
        uses: actions/download-artifact@v4
        with:
          # daily_pipeline.yml uploads as daily-delivery-{date}-{run_id}
          # Download to deliveries/today/ so live_stream.py finds full_pmfs_wide.parquet
          # at deliveries/today/full_pmfs_wide.parquet (its first search path).
          pattern: daily-delivery-*
          merge-multiple: true
          path: deliveries/today/
        continue-on-error: true   # OK if daily hasn't run yet today

      - name: Run live engine
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          LIVE_INTERVAL: "25"   # 25s poll, fits within 5-min cron window
        run: |
          GAME_ID_ARG=""
          DRY_RUN_ARG=""
          if [ -n "${{ github.event.inputs.game_id }}" ]; then
            GAME_ID_ARG="--game-id ${{ github.event.inputs.game_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          python scripts/live_stream.py \
            $GAME_ID_ARG \
            $DRY_RUN_ARG \
            --interval ${LIVE_INTERVAL}

      - name: Upload live predictions
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-predictions-${{ github.run_id }}
          path: artifacts/live/
          retention-days: 1
