# Canonical recommendation & publication policy (P2).
# SINGLE source of truth loaded by BOTH the live edge builder (build_edge_report.py)
# and the historical replay. Changing selection/publication behavior must happen here.
version: 1

edge:
  # Threshold selected on chronological development folds (see docs/p2_threshold_selection.md),
  # frozen before the untouched holdout. Nonzero — never publish every prop at 0.0.
  edge_threshold: 0.04
  min_market_prob: 0.05
  max_shin_z: 0.15
  supported_stats: [pts, reb, ast, fg3m]
  # Calibration layer that MUST be present and applied to a nonzero eligible set.
  required_calibration: [role_aware_isotonic]
  source_policy: odds_api_then_bdl

  # Publication mode for the Edge page:
  #   abstain  -> publish an explicit empty board ("No validated betting edges currently qualify")
  #   publish  -> publish qualifying, calibrated recommendations
  # Set to ABSTAIN: the Edge gate is NOT met (P1 repaired holdout: model log-loss worse than
  # the market, negative CLV, Under ROI CI spans zero, Overs materially negative).
  publication_mode: abstain

  # Diagnosed side/stat policy (Phase 5). Overs were materially negative (P1 holdout Over ROI
  # -9.4%, CI excludes zero); no side/stat currently qualifies, hence full abstention.
  suppress_sides: [over]
  suppress_stats: []

forecast:
  # VALIDATION_PENDING: the prior gate (midpoint-PIT uniformity, ignored two-sided
  # coverage, unlimited over-coverage, pooled dependent thresholds) is NOT accepted.
  # No stat is certified for public decision use until the CORRECTED gate
  # (evaluation/forecasting.py: randomized seeded PIT + two-sided coverage + line-level
  # calibration) runs successfully on a sufficient rolling-origin evaluation set.
  status: VALIDATION_PENDING
  # No stat is currently certified. publish_stats stays empty until the corrected gate
  # promotes a stat. certified_stats is what the public may treat as decision-usable.
  publish_stats: []
  certified_stats: []
  # Distributions may remain reachable but must show the pending banner below and must
  # NOT label any stat certified.
  pending_banner: "Forecast validation is being refreshed. No stat is currently certified for public decision use."
  # Prior (unaccepted) gate result — retained only for provenance, NOT authorization.
  prior_unvalidated_gate_pass: [reb, turnover]
  suppress_stats: [pts, ast, fg3m, blk, stl, reb, turnover]

# Overall release status. MUST be VALIDATION_PENDING while no stat is certified — never
# expose LAUNCH_READY/LIVE_VALIDATED anywhere until forecast.certified_stats is non-empty
# and each certified stat has a matching validated registry entry.
status: VALIDATION_PENDING
