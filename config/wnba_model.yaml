sport: wnba
bdl:
  base_url: "https://api.balldontlie.io"
  request_timeout_seconds: 30
  per_page: 100
  max_retries: 3

training:
  min_training_days: 365
  walk_forward_window_days: 28
  holdout_last_date_frac: 0.15
  quantiles: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50, 0.60, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
  production_draws: 50000
  calibration_seed: 0
  sparse_hurdle_draws: 4000
  market_bootstrap_reps: 2000
  market_bootstrap_seed: 20260512

calibration_gates:
  pit_ks_max: 0.050            # blueprint §9.1: PIT KS ≤ 0.050
  ece_max: 0.015               # blueprint §9.1: ECE ≤ 0.015
  ecce_mad_max: 0.030          # blueprint §9.1: Calibration Error (ECCE-MAD) < 0.03
  mean_error_abs_max: 0.10     # tightened from 0.15
  variance_error_abs_max: 0.20
  conformal_coverage_lo: 0.88  # blueprint §9.1: 88-92% conformal coverage
  conformal_coverage_hi: 0.92
  ucb95_logloss_max: -0.0025
  ucb95_brier_max: -0.0010
  min_rows_ucb95: 100
  min_rows_calibration_cell: 200

delivery:
  edge_threshold_abs: 0.04
  snapshots: ["morning", "pre_close"]
  vendors: ["draftkings", "fanduel", "caesars", "betrivers", "fanatics"]

# ── Production-safe mode ──────────────────────────────────────────────────────
# When demo_safe_mode=true, the pipeline enforces strict integrity rules:
#   - Market features are blocked from the structural model
#   - Calibrators cannot be applied to prediction dates before their cutoff
#   - Unvalidated advanced features are disabled
#   - Categories with insufficient data are labeled INSUFFICIENT_DATA
#   - Failed categories are suppressed rather than silently passed
#   - All model lineage fields are required in output
#   - model_edge is never labeled as CLV
production:
  demo_safe_mode: true
  fail_on_feature_leakage: true
  fail_on_artifact_date_violation: true
  require_model_lineage: true
  disable_unvalidated_advanced_features: true
  disable_market_features_in_structural_model: true
  require_calibration_cutoff_before_prediction: true
  allow_identity_calibration_fallback: true
  suppress_failed_categories: true
  mark_insufficient_categories: true
  deterministic_seed: 20260712
  # Market prior features (prior-game closing P(over), line, movement delta)
  # These are lagged one game so no same-game leakage exists, but they are
  # market-derived signals and must not enter the structural outcome model.
  # In safe mode they are stripped before the HGB feature matrix is built.
  strip_market_prior_features_in_safe_mode: true
  # Minimum observations required to label a calibration category as PASS
  min_calibration_obs: 150
  # Quote staleness threshold (seconds) above which market_quality_status degrades
  quote_stale_seconds: 7200
  # Minimum edge (probability points) to call a prediction PUBLISHABLE
  min_publishable_edge: 0.04
