random_seed: 20260610

# Use LogLinearStatModel (Dixon-Coles opponent adjustment) — same as Stage 4
use_log_linear: true

# OOF fold configuration
validation_window_days: 14

# Minimum training data before a fold qualifies for model_oof
min_train_long_rows: 2000
min_train_stat_rows: 250
min_sparse_positive_rows: 50

# DNP / low-minutes zero-inflation
dnp_minutes_threshold: 1.0
low_minutes_zero_inflation_enabled: true

stats:
  - pts
  - reb
  - ast
  - fg3m
  - stl
  - blk
  - turnover

# stl removed: near-Poisson (var/mean=1.21), direct NegBinom is correct.
# blk retained: structurally zero-inflated (positional/foul-out dependent).
sparse_stats:
  - blk

pmf_support_caps:
  pts: 60
  reb: 30
  ast: 25
  fg3m: 15
  stl: 10
  blk: 10
  turnover: 12

# Calibration eligible only for model_oof rows
calibration_eligible_prediction_types:
  - model_oof

# Stage identifier
pmf_source: stage5_walk_forward_oof_uncalibrated_model_only

# Exponential decay sample weighting — must match stage4_baseline.yaml so
# the OOF training distribution aligns with production predictions.
sample_weight_halflife_days: 45

# HistGradientBoosting — fewer iterations than stage4 (150 vs 300) to keep
# per-fold training tractable, while still matching the capacity increase
# (max_leaf_nodes 63) so that form_delta splits mirror production splits.
# Calibrators fitted on this OOF will transfer correctly to stage4 predictions
# because both models use the same feature set and similar tree structure.
hgb_regressor:
  max_iter: 150
  max_leaf_nodes: 63
  learning_rate: 0.08
  min_samples_leaf: 10

hgb_classifier:
  max_iter: 150
  max_leaf_nodes: 63
  learning_rate: 0.08
  min_samples_leaf: 10

# --------------------------------------------------------------------------
# F1: Minutes distribution marginalization (must match stage4_baseline.yaml)
# --------------------------------------------------------------------------
use_minutes_marginalization: false
minutes_marginalization_quadrature_points:
  - 0.10
  - 0.25
  - 0.50
  - 0.75
  - 0.90
minutes_marginalization_weights:
  - 0.10
  - 0.15
  - 0.50
  - 0.15
  - 0.10

# --------------------------------------------------------------------------
# F3: ZINB for sparse stats (must match stage4_baseline.yaml)
# --------------------------------------------------------------------------
use_zinb_for_sparse_stats: false

# --------------------------------------------------------------------------
# F5: Vig-removal method for market benchmark
# --------------------------------------------------------------------------
no_vig_method: shin
secondary_no_vig_method: power

# Per-stat configuration overrides (must match stage4_baseline.yaml)
stat_overrides:
  fg3m:
    use_beta_binomial: false
  turnover:
    use_minutes_offset: true
  ast:
    use_minutes_offset: true

# Phase 2–3 feature and model flags (must match stage4_baseline.yaml)
use_positional_defense_features: true
use_ewma_features: true
use_matchup_features: true
use_mean_dependent_dispersion: true
use_tuned_hyperparams: false
hgb_hyperparams_path: artifacts/hyperparams/best_params_all.json
use_model_ensemble: false
pi_rating_use_model_baseline: false

minutes_clip_min: 0.0
minutes_clip_max: 45.0
min_minutes_sigma: 3.0
uncertain_sigma_multiplier: 1.5
min_stat_mean: 0.01

# League-average priors used for prior_only PMFs when training data is insufficient.
# Estimated from Stage 4 full-data training (did_play=True rows).
league_priors:
  pts:
    mean: 8.70
    var: 55.56
  reb:
    mean: 3.61
    var: 10.52
  ast:
    mean: 2.15
    var: 5.17
  fg3m:
    mean: 0.85
    var: 1.52
  stl:
    mean: 0.78
    var: 0.94
  blk:
    mean: 0.43
    var: 0.56
  turnover:
    mean: 1.38
    var: 1.99

# --------------------------------------------------------------------------
# Advanced features — Item 2 of Production Blueprint
# 24 new columns from BDL extended endpoints
# --------------------------------------------------------------------------
use_advanced_features: true

new_features:
  # Usage features (player_season_advanced_stats, measure_type=usage)
  - player_usage_pct
  - player_usage_pct_ewma10
  - player_usage_pct_vs_avg
  # Shot quality (player_shot_locations)
  - player_pct_fg_restricted
  - player_pct_fg_corner3
  - player_pct_fg_midrange
  - player_fg_pct_restricted
  - shot_quality_score
  # Injury context (player_injuries + usage)
  - teammate_out_count
  - teammate_questionable_count
  - team_total_usage_of_out_players
  # Opponent context (team_game_advanced_stats)
  - opp_def_rating_ewma10
  - opp_pace_ewma10
  - game_pace_predicted
  # Standings / motivation
  - team_playoff_seed
  - team_games_behind
  # season_phase removed: categorical string (early/mid/late) — lives in
  # ROLE_BUCKET_COLS, one-hot encoded separately, excluded from FEATURE_FAMILIES
  # Four factors (player_season_advanced_stats, measure_type=four_factors)
  - player_efg_pct
  - player_ft_rate
  - player_tov_pct
