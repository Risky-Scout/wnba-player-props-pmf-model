  - teammate_questionable_count
  - team_total_usage_of_out_players
  # Opponent context (team_game_advanced_stats)
  - opp_def_rating_ewma10
  - opp_pace_ewma10
  - game_pace_predicted
  # Standings / motivation
  - team_playoff_seed
  - team_games_behind
