random_seed: 42

# Use LogLinearStatModel (Dixon-Coles opponent adjustment) — same as Stage 4
use_log_linear: true

# OOF fold configuration
validation_window_days: 7

# Restrict OOF validation windows to the current WNBA season only.
# Without this, game_dates from 2022-2025 produce ~30+ model-fitting folds
# (each requiring a full re-train of ~13 HGB models), blowing the 360-min budget.
# Training data per fold still uses ALL historical seasons — only the set of
# validation windows is filtered.  Set to the approximate season start date.
oof_first_val_date: "2026-05-01"

# Minimum training data before a fold qualifies for model_oof
min_train_long_rows: 2000
min_train_stat_rows: 250
min_sparse_positive_rows: 50

# DNP / low-minutes zero-inflation
dnp_minutes_threshold: 1.0
low_minutes_zero_inflation_enabled: true

stats:
  - pts
  - reb
  - ast
  - fg3m
  - stl
  - blk
  - turnover

# stl removed: near-Poisson (var/mean=1.21), direct NegBinom is correct.
# blk retained: structurally zero-inflated (positional/foul-out dependent).
sparse_stats:
  - stl
  - blk

pmf_support_caps:
  pts: 60
  reb: 30
  ast: 25
  fg3m: 15
  stl: 10
  blk: 10
  turnover: 12

# Calibration eligible only for model_oof rows
calibration_eligible_prediction_types:
  - model_oof

# Stage identifier
pmf_source: stage5_walk_forward_oof_uncalibrated_model_only

# Exponential decay sample weighting — must match stage4_baseline.yaml so
# the OOF training distribution aligns with production predictions.
sample_weight_halflife_days: 42

# HistGradientBoosting — must match stage4_baseline.yaml capacity so the OOF
# and production models produce the same prediction range. Mismatched capacity
# causes the calibrators to learn a correction curve that over-compresses
# production predictions (root cause of the ~30% under-prediction bug).
#
# Tuning history:
#   100 iter / 31 leaves  → ~2h OOF build; calibrator bias mismatch ~1.5 pt
#   150 iter / 50 leaves  → ~3.5h OOF build; mismatch ~0.6 pt
#   150 iter / 63 leaves  → ~4h OOF build (fits within timeout-minutes: 360)
#
# timeout-minutes in weekly_calibration.yml is 360; 150 iter fits within that budget.
hgb_regressor:
  max_iter: 150
  max_leaf_nodes: 63
  learning_rate: 0.08
  min_samples_leaf: 10
  early_stopping: true
  n_iter_no_change: 10
  tol: 1.0e-3

hgb_classifier:
  max_iter: 150
  max_leaf_nodes: 63
  learning_rate: 0.08
  min_samples_leaf: 10
  early_stopping: true
  n_iter_no_change: 10
  tol: 1.0e-3

# --------------------------------------------------------------------------
# F1: Minutes distribution marginalization (must match stage4_baseline.yaml)
# --------------------------------------------------------------------------
use_minutes_marginalization: true
minutes_marginalization_quadrature_points:
  - 0.10
  - 0.25
  - 0.50
  - 0.75
  - 0.90
minutes_marginalization_weights:
  - 0.10
  - 0.15
  - 0.50
  - 0.15
  - 0.10

# --------------------------------------------------------------------------
# F3: ZINB for sparse stats (must match stage4_baseline.yaml)
# --------------------------------------------------------------------------
use_zinb_for_sparse_stats: true

# --------------------------------------------------------------------------
# F5: Vig-removal method for market benchmark
# --------------------------------------------------------------------------
no_vig_method: shin
secondary_no_vig_method: power

