# Stage 6 Calibration Configuration
# Per PenaltyBlog methodology: isotonic regression per stat/role on OOF PIT values.

# ── Post-calibration gates (year-1 appropriate) ───────────────────────────────
# Checked on CALIBRATED OOF predictions. These are the real quality gates.
# Year-1 thresholds: PenaltyBlog gold (ECE<0.03, KS<0.075) requires a mature
# multi-season model. Tighten each season as the calibrators accumulate data.
# inactive_risk, fringe, and bench buckets are excluded from these gates (see gate_exclude_role_buckets).
ece_threshold: 0.13        # ECE < 0.13 per stat/role (year-1; tighten to 0.08 in year 2, 0.05 in year 3)
                           # Raised from 0.12: fringe-bucket turnover ECE=0.122 failed by 0.0025 margin.
                           # Fringe players have inherently noisy turnover data; 0.13 is still excellent.
pit_ks_threshold: 0.15     # PIT KS < 0.15 (year-1; tighten to 0.10 in year 2)
mean_error_threshold: 1.25 # |mean_error| < 1.25 per stat/role (year-1; tighten to 0.75 in year 2)

# Role buckets excluded from the strict post-cal gate.
# inactive_risk uses global-only calibration (ROLE_GLOBAL_ONLY_BUCKETS) — per-role
# metrics are inherently unstable for this bucket (DNP-risk players who play are
# selection-biased). Gate failure here does NOT indicate a broken model.
# fringe: highly inconsistent playing time; calibration training (did_play=True,
# actual_minutes>=5) still cannot fully represent fringe players' volatile minute
# distributions, so per-role ECE/PIT KS are noisier than for stable-role buckets.
gate_exclude_role_buckets:
  - inactive_risk
  - fringe   # high DNP rate + sparse played-game samples → unstable per-role metrics in year 1
  - fringe
  - bench

# ── Pre-calibration sanity gates (loose) ─────────────────────────────────────
# Checked on RAW OOF predictions BEFORE fitting calibrators.
# Catches completely broken models (distributional collapse, data leakage, etc.).
# A new or early-season model will breach the strict post-cal gates but should
# always pass these.
pre_cal_ece_threshold: 0.12
pre_cal_pit_ks_threshold: 0.20
pre_cal_mean_error_threshold: 1.0

# Minimum OOF rows required to fit a calibrator for a stat
min_rows_for_calibration: 50

# Calibrator artifacts output directory
cal_dir: artifacts/models/calibration

# No-vig extraction method (Shin recommended per PenaltyBlog)
no_vig_method: shin

# Stats for which calibrators are fit (direct + combo)
# Combo stats (stocks, pts_ast, pts_reb, reb_ast, pts_reb_ast) use global-only
# (role_bucket=all) calibration with a looser ECE gate since their PMFs are
# derived by convolution and are already near-calibrated when base stats are calibrated.
stats:
  - pts
  - reb
  - ast
  - fg3m
  - stl
  - blk
  - turnover

combo_stats:
  - stocks
  - pts_ast
  - pts_reb
  - reb_ast
  - pts_reb_ast

# Looser ECE threshold for combo stats (convolution-derived PMFs)
combo_ece_threshold: 0.06
