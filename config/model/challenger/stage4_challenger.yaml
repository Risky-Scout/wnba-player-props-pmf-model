# ── Challenger-specific settings ─────────────────────────────────────────────
# Version tag for artifact lineage
challenger_version: "challenger_v1_2026-07-14"
feature_schema_version: "challenger_v1"

# Output directories (never overwrite champion)
output_dir: data/model_outputs/challenger_v1
model_artifact_dir: artifacts/models/challenger_v1

# PMF source label
pmf_source: challenger_v1_uncalibrated

# Deterministic seed
random_seed: 20260714

# C.6 form correction: use per-minute rate (challenger uses B path for all stats)
c6_correction_mode: per_minute_rate

# Enable safe mode enforcement
production:
  demo_safe_mode: true
  fail_on_feature_leakage: true
  disable_market_features_in_structural_model: true
  require_calibration_cutoff_before_prediction: true
  deterministic_seed: 20260714
  strip_market_prior_features_in_safe_mode: true
